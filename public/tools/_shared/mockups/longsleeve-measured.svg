<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 850" font-family="Montserrat, sans-serif">
  <!-- Gray-filled longsleeve -->
  <g fill="#cfcfcf" stroke="#111" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 245 175 L 130 320 L 145 660 L 230 660 L 245 240 L 245 760 L 455 760 L 455 240 L 470 660 L 555 660 L 570 320 L 455 175 L 410 175 Q 350 245 290 175 L 245 175 Z" />
  </g>
  <g fill="none" stroke="#111" stroke-width="1.5">
    <path d="M 295 165 Q 350 215 405 165" />
    <path d="M 145 645 L 230 645" stroke-width="1" />
    <path d="M 470 645 L 555 645" stroke-width="1" />
  </g>

  <g stroke="#d6342f" fill="#d6342f">
    <!-- 1. Neck Width -->
    <line x1="290" y1="195" x2="410" y2="195" stroke-width="1.5" />
    <polygon points="290,195 298,191 298,199" />
    <polygon points="410,195 402,191 402,199" />

    <!-- 2. Body Length -->
    <line x1="495" y1="200" x2="495" y2="755" stroke-width="1.5" />
    <polygon points="495,200 491,208 499,208" />
    <polygon points="495,755 491,747 499,747" />

    <!-- 3. Chest Width -->
    <line x1="245" y1="310" x2="455" y2="310" stroke-width="1.5" />
    <polygon points="245,310 253,306 253,314" />
    <polygon points="455,310 447,306 447,314" />

    <!-- 4. Bottom Width -->
    <line x1="245" y1="745" x2="455" y2="745" stroke-width="1.5" />
    <polygon points="245,745 253,741 253,749" />
    <polygon points="455,745 447,741 447,749" />

    <!-- 5. Shoulder Width -->
    <line x1="245" y1="160" x2="455" y2="160" stroke-width="1.5" />
    <polygon points="245,160 253,156 253,164" />
    <polygon points="455,160 447,156 447,164" />

    <!-- 6. Sleeve Length -->
    <line x1="245" y1="220" x2="143" y2="650" stroke-width="1.5" />
    <polygon points="245,220 240,226 248,232" />
    <polygon points="143,650 149,646 147,654" />

    <!-- 7. Cuff Width -->
    <line x1="148" y1="652" x2="227" y2="652" stroke-width="1.5" />
    <polygon points="148,652 156,648 156,656" />
    <polygon points="227,652 219,648 219,656" />

    <!-- 8. Neck Drop -->
    <line x1="350" y1="180" x2="350" y2="245" stroke-width="1.5" />
    <polygon points="350,180 346,188 354,188" />
    <polygon points="350,245 346,237 354,237" />
  </g>

  <g font-family="Montserrat, sans-serif" font-weight="900" font-size="13">
    <g fill="#fff" stroke="#d6342f" stroke-width="1.5">
      <circle cx="350" cy="210" r="11" />
      <circle cx="520" cy="475" r="11" />
      <circle cx="350" cy="335" r="11" />
      <circle cx="350" cy="775" r="11" />
      <circle cx="240" cy="135" r="11" />
      <circle cx="172" cy="430" r="11" />
      <circle cx="187" cy="685" r="11" />
      <circle cx="380" cy="215" r="11" />
    </g>
    <g fill="#d6342f" text-anchor="middle">
      <text x="350" y="214">1</text>
      <text x="520" y="479">2</text>
      <text x="350" y="339">3</text>
      <text x="350" y="779">4</text>
      <text x="240" y="139">5</text>
      <text x="172" y="434">6</text>
      <text x="187" y="689">7</text>
      <text x="380" y="219">8</text>
    </g>
  </g>
</svg>
