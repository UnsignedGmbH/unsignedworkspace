<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 850" font-family="Montserrat, sans-serif">
  <!-- Gray-filled hoodie -->
  <g fill="#cfcfcf" stroke="#111" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 245 215 L 120 360 L 130 660 L 215 660 L 245 280 L 220 760 L 480 760 L 455 280 L 485 660 L 570 660 L 580 360 L 455 215 L 420 215 Q 430 105 350 95 Q 270 105 280 215 Z" />
  </g>
  <g fill="none" stroke="#111" stroke-width="1.5">
    <path d="M 290 215 Q 285 120 350 110 Q 415 120 410 215" />
    <path d="M 220 745 L 480 745" stroke-width="1" />
    <path d="M 130 645 L 215 645" stroke-width="1" />
    <path d="M 485 645 L 570 645" stroke-width="1" />
    <path d="M 270 480 L 295 450 L 405 450 L 430 480 L 430 580 L 270 580 Z" stroke-width="2" />
  </g>
  <circle cx="330" cy="220" r="3" fill="#111" />
  <circle cx="370" cy="220" r="3" fill="#111" />

  <g stroke="#d6342f" fill="#d6342f">
    <!-- 1. Body Length -->
    <line x1="510" y1="215" x2="510" y2="755" stroke-width="1.5" />
    <polygon points="510,215 506,223 514,223" />
    <polygon points="510,755 506,747 514,747" />

    <!-- 2. Chest Width -->
    <line x1="245" y1="350" x2="455" y2="350" stroke-width="1.5" />
    <polygon points="245,350 253,346 253,354" />
    <polygon points="455,350 447,346 447,354" />

    <!-- 3. Bottom Rib Width -->
    <line x1="222" y1="745" x2="478" y2="745" stroke-width="1.5" />
    <polygon points="222,745 230,741 230,749" />
    <polygon points="478,745 470,741 470,749" />

    <!-- 4. Shoulder Width -->
    <line x1="245" y1="200" x2="455" y2="200" stroke-width="1.5" />
    <polygon points="245,200 253,196 253,204" />
    <polygon points="455,200 447,196 447,204" />

    <!-- 5. Sleeve Length -->
    <line x1="245" y1="260" x2="125" y2="650" stroke-width="1.5" />
    <polygon points="245,260 240,266 248,272" />
    <polygon points="125,650 132,646 130,654" />

    <!-- 6. Cuff Width -->
    <line x1="133" y1="652" x2="212" y2="652" stroke-width="1.5" />
    <polygon points="133,652 141,648 141,656" />
    <polygon points="212,652 204,648 204,656" />

    <!-- 7. Hood Height -->
    <line x1="445" y1="98" x2="445" y2="215" stroke-width="1.5" />
    <polygon points="445,98 441,106 449,106" />
    <polygon points="445,215 441,207 449,207" />

    <!-- 8. Pocket Width -->
    <line x1="272" y1="555" x2="428" y2="555" stroke-width="1.5" />
    <polygon points="272,555 280,551 280,559" />
    <polygon points="428,555 420,551 420,559" />
  </g>

  <g font-family="Montserrat, sans-serif" font-weight="900" font-size="13">
    <g fill="#fff" stroke="#d6342f" stroke-width="1.5">
      <circle cx="535" cy="487" r="11" />
      <circle cx="350" cy="375" r="11" />
      <circle cx="350" cy="775" r="11" />
      <circle cx="240" cy="175" r="11" />
      <circle cx="160" cy="450" r="11" />
      <circle cx="172" cy="685" r="11" />
      <circle cx="475" cy="155" r="11" />
      <circle cx="350" cy="580" r="11" />
    </g>
    <g fill="#d6342f" text-anchor="middle">
      <text x="535" y="491">1</text>
      <text x="350" y="379">2</text>
      <text x="350" y="779">3</text>
      <text x="240" y="179">4</text>
      <text x="160" y="454">5</text>
      <text x="172" y="689">6</text>
      <text x="475" y="159">7</text>
      <text x="350" y="584">8</text>
    </g>
  </g>
</svg>
