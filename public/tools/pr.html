<style>
:root {
  --a: #C13030;
  --a-dark: #A51F1F;
  --bg: #f4f3f0;
  --cd: #ffffff;
  --cd2: #f9f9f9;
  --bd: rgba(0,0,0,.09);
  --bd2: rgba(0,0,0,.05);
  --t: #111111;
  --td: #555555;
  --tdd: #aaaaaa;
  --g: #1D9E75;
  --b: #185FA5;
  --y: #D67A1A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--t);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}
button, input, textarea, select { font-family: inherit; color: inherit; font-size: 13px; }
button { border: none; background: none; cursor: pointer; }
a { color: var(--a); text-decoration: none; }
input, textarea, select { outline: none; }
input[type=text], input[type=number], input[type=date], input[type=url], textarea, select {
  background: var(--cd); border: .5px solid var(--bd);
  border-radius: 6px; padding: 7px 10px;
  width: 100%; transition: border-color .15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--a); }
textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px);
  border-bottom: .5px solid var(--bd);
  display: flex; align-items: center; gap: 16px;
  padding: 0 18px; height: 56px;
}
.tb-logo { font-size: 14px; font-weight: 900; font-style: italic; color: var(--a); line-height: 1; flex-shrink: 0; }
.tb-logo span { font-family: 'Dancing Script', cursive; font-size: 12px; color: var(--tdd); font-style: normal; display: block; line-height: 1; margin-top: 2px; }

.prod-tabs {
  flex: 1; display: flex; gap: 6px; overflow-x: auto;
  padding: 4px 0; min-width: 0;
}
.prod-tabs::-webkit-scrollbar { height: 4px; }
.prod-tabs::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }
.ptab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px;
  border: .5px solid var(--bd); background: var(--cd);
  font-size: 11px; font-weight: 700; color: var(--td);
  white-space: nowrap; cursor: pointer; transition: all .15s;
  flex-shrink: 0;
}
.ptab:hover { border-color: var(--a); color: var(--a); }
.ptab.on { background: var(--a); color: #fff; border-color: var(--a); }
.ptab .menu {
  font-size: 13px; opacity: .6; padding: 0 2px;
}
.ptab .menu:hover { opacity: 1; }
.add-prod {
  padding: 6px 12px; border-radius: 8px;
  border: 1.5px dashed var(--bd); background: transparent;
  font-size: 11px; font-weight: 700; color: var(--td);
  white-space: nowrap; cursor: pointer; transition: all .15s;
  flex-shrink: 0;
}
.add-prod:hover { border-color: var(--a); color: var(--a); }

.tb-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.tb-btn {
  padding: 6px 12px; border-radius: 8px;
  border: .5px solid var(--bd); background: var(--cd);
  font-size: 11px; font-weight: 700; color: var(--td);
  cursor: pointer; transition: all .15s;
}
.tb-btn:hover { border-color: var(--a); color: var(--a); }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; color: var(--g);
  padding: 4px 10px; border-radius: 999px;
  background: rgba(29,158,117,.12);
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--g); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── LAYOUT ── */
.layout { display: flex; min-height: calc(100vh - 56px); }
.sidenav {
  width: 230px; flex-shrink: 0;
  background: var(--cd); border-right: .5px solid var(--bd);
  padding: 16px 0; overflow-y: auto;
}
.sn-group {
  font-size: 9px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--tdd);
  padding: 6px 18px 4px;
}
.sn-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px; cursor: pointer; transition: all .12s;
  font-size: 12px; font-weight: 600; color: var(--td);
  border-left: 2px solid transparent;
}
.sn-item:hover { background: rgba(0,0,0,.025); color: var(--t); }
.sn-item.on {
  background: rgba(193,48,48,.06);
  color: var(--a); font-weight: 800;
  border-left-color: var(--a);
}
.sn-item .ico { width: 18px; text-align: center; flex-shrink: 0; }
.sn-item .check { font-size: 11px; color: var(--g); margin-left: auto; }
.sn-item.empty .check { display: none; }

.main { flex: 1; padding: 28px 32px; overflow-y: auto; }
.main h1 { font-size: 20px; font-weight: 900; color: var(--t); margin-bottom: 4px; }
.main h1 .ico { margin-right: 6px; }
.main .sub { font-size: 12px; color: var(--td); margin-bottom: 22px; }

.empty-state { padding: 60px 20px; text-align: center; color: var(--td); }
.empty-state .big { font-size: 48px; margin-bottom: 12px; opacity: .4; }

/* ── FORM GRID ── */
.fg { display: grid; gap: 12px; margin-bottom: 18px; }
.fg.cols-2 { grid-template-columns: 1fr 1fr; }
.fg.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 720px) { .fg.cols-2, .fg.cols-3 { grid-template-columns: 1fr; } }

.field label {
  display: block;
  font-size: 9px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--td);
  margin-bottom: 4px;
}
.field .hint { font-size: 10px; color: var(--tdd); margin-top: 4px; }

/* ── IMAGE GALLERY ── */
.gal {
  margin-top: 16px;
}
.gal-label {
  font-size: 9px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--td);
  margin-bottom: 8px;
}
.dropzone {
  border: 1.5px dashed var(--bd);
  border-radius: 12px; padding: 18px;
  text-align: center; cursor: pointer;
  transition: all .15s;
  background: var(--cd);
  margin-bottom: 10px;
}
.dropzone:hover, .dropzone.over {
  border-color: var(--a); background: rgba(193,48,48,.03);
}
.dropzone .upload-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  background: var(--a); color: #fff;
  font-size: 11px; font-weight: 800;
  margin-bottom: 6px;
}
.dropzone .info { font-size: 11px; color: var(--td); }
.gal-grid {
  display: grid; gap: 8px;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
}
.gal-item {
  position: relative; aspect-ratio: 1;
  border-radius: 10px; overflow: hidden;
  background: var(--cd2); border: .5px solid var(--bd);
  cursor: zoom-in;
}
.gal-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gal-item .del {
  position: absolute; top: 6px; right: 6px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(193,48,48,.9); color: #fff;
  font-size: 12px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s; cursor: pointer;
}
.gal-item:hover .del { opacity: 1; }

/* ── LIGHTBOX ── */
.lb {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(20,20,20,.92); backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  padding: 40px;
}
.lb.open { display: flex; }
.lb img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
.lb .close {
  position: fixed; top: 20px; right: 20px;
  width: 40px; height: 40px; border-radius: 8px;
  background: rgba(255,255,255,.1); color: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border: .5px solid rgba(255,255,255,.2);
}

/* ── MEASUREMENTS GRID ── */
.measure {
  border: .5px solid var(--bd); border-radius: 10px;
  overflow: hidden; background: var(--cd);
}
.measure-row {
  display: grid;
  border-top: .5px solid var(--bd2);
}
.measure-row:first-child { border-top: none; }
.measure-row.head {
  background: var(--cd2);
  font-size: 9px; font-weight: 900; color: var(--td);
  letter-spacing: .08em; text-transform: uppercase;
}
.measure-row.head > div { padding: 8px 10px; text-align: center; }
.measure-row.head > div:first-child { text-align: left; }
.measure-row > input {
  background: transparent; border: none;
  padding: 8px 10px; font-size: 12px;
  border-left: .5px solid var(--bd2); width: 100%;
  border-radius: 0;
  text-align: center;
}
.measure-row > input.label-input {
  border-left: none; text-align: left;
  font-weight: 700; color: var(--t);
}
.measure-row > input:focus { background: rgba(193,48,48,.04); }
.measure-row .del-row {
  display: flex; align-items: center; justify-content: center;
  color: var(--tdd); cursor: pointer;
  border-left: .5px solid var(--bd2);
}
.measure-row .del-row:hover { background: rgba(193,48,48,.08); color: var(--a); }
.size-cfg {
  display: flex; gap: 6px; align-items: center;
  margin-top: 10px; flex-wrap: wrap;
}
.size-pill {
  padding: 4px 10px; border-radius: 999px;
  background: var(--cd2); border: .5px solid var(--bd);
  font-size: 11px; font-weight: 700; color: var(--td);
  cursor: pointer;
}
.size-pill.on { background: var(--a); color: #fff; border-color: var(--a); }

/* ── PRICING ── */
.price-list {
  border: .5px solid var(--bd); border-radius: 10px;
  background: var(--cd);
  margin-bottom: 16px;
}
.price-row {
  display: grid; grid-template-columns: 1fr 140px 32px;
  border-top: .5px solid var(--bd2);
}
.price-row:first-child { border-top: none; }
.price-row > input {
  border: none; border-radius: 0; padding: 9px 12px;
  border-left: .5px solid var(--bd2);
}
.price-row > input:first-child { border-left: none; }
.price-row .del {
  display: flex; align-items: center; justify-content: center;
  color: var(--tdd); cursor: pointer;
  border-left: .5px solid var(--bd2);
}
.price-row .del:hover { background: rgba(193,48,48,.08); color: var(--a); }

.price-summary {
  background: var(--cd); border: .5px solid var(--bd);
  border-radius: 10px; padding: 16px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
@media (max-width: 720px) { .price-summary { grid-template-columns: 1fr; } }
.price-stat {
  background: var(--cd2); border: .5px solid var(--bd2);
  border-radius: 8px; padding: 12px 14px;
}
.price-stat .lbl {
  font-size: 9px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--td);
  margin-bottom: 3px;
}
.price-stat .val {
  font-size: 18px; font-weight: 900; color: var(--t);
}
.price-stat .val.brand { color: var(--a); }
.price-stat .val.good { color: var(--g); }
.price-stat .val.warn { color: var(--y); }

/* ── PRODUCTION STATUS ── */
.status-flow {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 16px;
}
.status-step {
  flex: 1; min-width: 140px;
  padding: 10px 12px; border-radius: 8px;
  border: .5px solid var(--bd); background: var(--cd);
  font-size: 11px; font-weight: 700; color: var(--td);
  cursor: pointer; transition: all .15s;
  text-align: center; line-height: 1.3;
}
.status-step .num {
  font-size: 9px; font-weight: 900; opacity: .6; display: block; margin-bottom: 2px;
}
.status-step:hover { border-color: var(--a); color: var(--a); }
.status-step.on { background: var(--a); color: #fff; border-color: var(--a); }
.status-step.passed { background: rgba(29,158,117,.1); color: var(--g); border-color: rgba(29,158,117,.3); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 11px; font-weight: 800; cursor: pointer;
  border: .5px solid var(--bd); background: var(--cd); color: var(--td);
  transition: all .15s;
}
.btn:hover { border-color: var(--a); color: var(--a); }
.btn.primary { background: var(--a); color: #fff; border-color: var(--a); }
.btn.primary:hover { background: var(--a-dark); color: #fff; }
.btn.danger { color: var(--a); }
.btn.danger:hover { background: rgba(193,48,48,.08); border-color: var(--a); }
.btn-add {
  width: 100%;
  padding: 9px;
  border-radius: 8px; border: 1.5px dashed var(--bd);
  background: transparent; font-size: 11px; font-weight: 700;
  color: var(--td); cursor: pointer;
}
.btn-add:hover { border-color: var(--a); color: var(--a); background: rgba(193,48,48,.03); }

.preset-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.preset {
  padding: 3px 9px; border-radius: 999px;
  background: var(--cd2); border: .5px solid var(--bd);
  font-size: 10px; font-weight: 700; color: var(--td);
  cursor: pointer; transition: all .12s;
}
.preset:hover { background: var(--a); color: #fff; border-color: var(--a); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 9000;
  background: rgba(20,20,20,.55); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--cd); border-radius: 14px; padding: 22px;
  max-width: 420px; width: 100%;
  box-shadow: 0 30px 80px rgba(0,0,0,.25);
}
.modal h3 { font-size: 15px; font-weight: 900; margin-bottom: 6px; }
.modal p { font-size: 12px; color: var(--td); margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-actions .btn { flex: 1; justify-content: center; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #111; color: #fff;
  padding: 10px 20px; border-radius: 10px;
  font-size: 12px; font-weight: 700; z-index: 99999;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ── PRINT ── */
@media print {
  .topbar, .sidenav, .add-prod, .btn-add, .preset-row,
  .gal-item .del, .price-row .del, .measure-row .del-row,
  .dropzone, .tb-actions, .ptab .menu, .modal-overlay, .lb {
    display: none !important;
  }
  .layout { display: block; min-height: 0; }
  .main { padding: 16px; }
  body { background: #fff; }
  .print-section { break-inside: avoid; padding: 12px 0; border-top: 2px solid #000; }
  .print-section:first-child { border-top: none; }
  .print-section h1 { font-size: 16px; }
  .gal-item { aspect-ratio: auto; }
  .gal-item img { max-height: 380px; object-fit: contain; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">Production <span>Unsigned</span></div>
  <div class="prod-tabs" id="prodTabs"></div>
  <button class="add-prod" id="addProdBtn">+ Produkt</button>
  <div class="tb-actions">
    <button class="tb-btn" onclick="window.print()" title="Tech Pack als PDF drucken">📄 Drucken</button>

      <span class="live-dot"></span>Live

</div>

<div class="layout">

</div>

<!-- Lightbox -->
<div class="lb" id="lb"><button class="close" onclick="closeLb()">✕</button><img id="lbImg" src=""></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Titel</h3>
    <p id="modalDesc"></p>
    <input id="modalInput" type="text" style="margin-bottom:0">
    <div class="modal-actions">
      <button class="btn" id="modalCancel">Abbrechen</button>
      <button class="btn primary" id="modalOk">OK</button>
    </div>
  </div>
</div>

<div id="toast"></div>

var SECTIONS_BY_ID = {};
SECTIONS.forEach(function(s){ SECTIONS_BY_ID[s.id] = s; });

var STATUS_STEPS = [
  { id: 'briefing', label: 'Briefing' },
  { id: 'sample-order', label: 'Sample Order' },
  { id: 'sample-received', label: 'Sample Received' },
  { id: 'bulk-order', label: 'Bulk Order' },
  { id: 'shipping', label: 'Shipping' },
  { id: 'done', label: 'Done' },
];
var STATUS_PCT = { 'briefing':10, 'sample-order':30, 'sample-received':50, 'bulk-order':75, 'shipping':90, 'done':100 };

var DEFAULT_SIZES = ['XS','S','M','L','XL','XXL'];
var DEFAULT_MEASURE_LABELS = [
  'Body Length','Chest Width','Bottom Width','Shoulder','Sleeve Opening',
  'Sleeve Length','Armhole','Collar','Collar Height','Hem','Cuff','Cuff Height','Bottom Hem'
];

// ── State ───────────────────────────────────────────────────────────
var STATE = null;
var ACTIVE_PRODUCT = null;
var ACTIVE_SECTION = 'start';
var SAVE_TO = null;
var SUPPRESS_SAVE = false;

function uid(){ return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function makeProduct(name){
  var p = {
    id: uid(),
    name: name || 'Neues Produkt',
    sections: {},
    pricing: { items: [{ label: 'Base Cost', amount: 0 }, { label: 'Print', amount: 0 }, { label: 'Wash', amount: 0 }, { label: 'Labels', amount: 0 }, { label: 'Packaging', amount: 0 }], quantity: 100, salesPrice: 0 },
    production: {
      status: 'briefing',
      sampleOrder: '', sampleReceived: '',
      bulkOrder: '', bulkReceived: '',
      shipping: '', tracking: '', notes: '',
    },
    measurements: { sizes: ['XS','S','M','L','XL','XXL'], rows: DEFAULT_MEASURE_LABELS.map(function(l){ return { label:l, values:{} }; }) },
    labels: { hangtag:{ images:[], note:'', dimensions:'' }, care:{ images:[], text:'', note:'' }, main:{ images:[], note:'' }, extra:{ images:[], note:'' } },
    extraInfo: { fitLook: [], washedLook: [], note: '' },
  };
  SECTIONS.forEach(function(sec){
    if (sec.custom) return;
    var obj = {};
    (sec.fields||[]).forEach(function(f){ obj[f.key] = ''; });
    obj.images = []; obj.note = '';
    p.sections[sec.id] = obj;
  });
  return p;
}

function makeDefaultState(){ return { products: [makeProduct('Produkt 1')] }; }

function _toArr(v){ if(Array.isArray(v)) return v; if(v && typeof v==='object') return Object.values(v); return []; }

function getActiveProduct(){
  if (!STATE || !STATE.products || !STATE.products.length) return null;
  if (ACTIVE_PRODUCT) {
    var p = STATE.products.find(function(x){ return x.id === ACTIVE_PRODUCT; });
    if (p) return p;
  }
  ACTIVE_PRODUCT = STATE.products[0].id;
  return STATE.products[0];
}

// ── Apply Remote ────────────────────────────────────────────────────
function applyRemote(remote){
  if (!remote || typeof remote !== 'object') return;
  var products = _toArr(remote.products);
  if (!products.length) return;
  STATE = { products: products.filter(Boolean).map(function(rp){
    var p = makeProduct(rp.name || 'Produkt');
    p.id = rp.id || p.id;
    p.name = rp.name || p.name;
    // Standard sections
    if (rp.sections && typeof rp.sections === 'object'){
      SECTIONS.forEach(function(sec){
        if (sec.custom) return;
        var rs = rp.sections[sec.id];
        if (!rs) return;
        var obj = p.sections[sec.id];
        (sec.fields||[]).forEach(function(f){ obj[f.key] = rs[f.key] || ''; });
        obj.images = _toArr(rs.images).filter(Boolean);
        obj.note = rs.note || '';
      });
    }
    // Custom sections
    if (rp.measurements){
      p.measurements.sizes = _toArr(rp.measurements.sizes);
      if (!p.measurements.sizes.length) p.measurements.sizes = ['XS','S','M','L','XL','XXL'];
      var rows = _toArr(rp.measurements.rows);
      p.measurements.rows = rows.length ? rows.filter(Boolean).map(function(r){
        return { label: r.label || 'Measurement', values: r.values || {} };
      }) : DEFAULT_MEASURE_LABELS.map(function(l){ return {label:l, values:{}}; });
      p.measurements.images = _toArr(rp.measurements.images).filter(Boolean);
      p.measurements.note = rp.measurements.note || '';
    }
    if (rp.labels){
      ['hangtag','care','main','extra'].forEach(function(k){
        var lr = rp.labels[k] || {};
        p.labels[k] = {
          images: _toArr(lr.images).filter(Boolean),
          note: lr.note || '',
          text: lr.text || '',
          dimensions: lr.dimensions || '',
        };
      });
    }
    if (rp.extraInfo){
      p.extraInfo = {
        fitLook: _toArr(rp.extraInfo.fitLook).filter(Boolean),
        washedLook: _toArr(rp.extraInfo.washedLook).filter(Boolean),
        note: rp.extraInfo.note || '',
      };
    }
    if (rp.pricing){
      var items = _toArr(rp.pricing.items).filter(Boolean).map(function(i){ return { label:i.label||'', amount:Number(i.amount)||0 }; });
      p.pricing = {
        items: items.length ? items : p.pricing.items,
        quantity: Number(rp.pricing.quantity)||0,
        salesPrice: Number(rp.pricing.salesPrice)||0,
      };
    }
    if (rp.production){
      p.production = {
        status: rp.production.status || 'briefing',
        sampleOrder: rp.production.sampleOrder || '',
        sampleReceived: rp.production.sampleReceived || '',
        bulkOrder: rp.production.bulkOrder || '',
        bulkReceived: rp.production.bulkReceived || '',
        shipping: rp.production.shipping || '',
        tracking: rp.production.tracking || '',
        notes: rp.production.notes || '',
      };
    }
    return p;
  }) };
  if (!STATE.products.length) STATE = makeDefaultState();
}

// ── Persistence ─────────────────────────────────────────────────────
function scheduleSave(){
  if (SUPPRESS_SAVE) return;
  clearTimeout(SAVE_TO);
  SAVE_TO = setTimeout(save, 500);
}
function save(){
  if (!_DB || !_ROOM || !STATE) return;
  var data = JSON.parse(JSON.stringify(STATE));
  console.log('[pr] save → rooms/'+_ROOM+'/production', { products: data.products.length });
  _DB.ref('rooms/'+_ROOM+'/production').set(data)
    .catch(function(err){
      console.error('[pr] save failed:', err);
      toast('Speichern fehlgeschlagen: '+(err.code||err.message));
    });
  postProgress();
}
function postProgress(){
  if (!STATE || !STATE.products.length) return;
  var sum = 0;
  STATE.products.forEach(function(p){ sum += STATUS_PCT[(p.production||{}).status || 'briefing'] || 0; });
  var pct = Math.round(sum / STATE.products.length);
  try { window.parent.postMessage({type:'prPct', pct: pct}, '*'); } catch(e){}
}
function loadRemote(){
  if (!_DB || !_ROOM) { STATE = makeDefaultState(); render(); return; }
  _DB.ref('rooms/'+_ROOM+'/production').on('value', function(snap){
    var v = snap.val();
    if (!v){
      if (!STATE){ STATE = makeDefaultState(); render(); }
      return;
    }
    SUPPRESS_SAVE = true;
    applyRemote(v);
    SUPPRESS_SAVE = false;
    if (!ACTIVE_PRODUCT && STATE.products[0]) ACTIVE_PRODUCT = STATE.products[0].id;
    render({preserveFocus:true});
    var live = document.getElementById('liveBadge');
    if (live) live.style.display = 'flex';
  }, function(err){
    console.error('[pr] listener error:', err);
    toast('Sync-Fehler: '+(err.code||err.message));
    if (!STATE){ STATE = makeDefaultState(); render(); }
  });
}

// ── DOM helpers ─────────────────────────────────────────────────────
function escHtml(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function el(tag, attrs, children){
  var n = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k === 'on') Object.keys(attrs[k]).forEach(function(ev){ n.addEventListener(ev, attrs[k][ev]); });
    else if (k === 'data') Object.keys(attrs[k]).forEach(function(d){ n.dataset[d] = attrs[k][d]; });
    else if (k === 'style') n.setAttribute('style', attrs[k]);
    else n.setAttribute(k, attrs[k]);
  });
  (children||[]).forEach(function(c){ if(c) n.appendChild(c); });
  return n;
}

// ── Focus preservation ──────────────────────────────────────────────
var FOCUS_PATH = null, FOCUS_SEL = null;
function captureFocus(){
  var ae = document.activeElement;
  if (!ae || !ae.dataset || !ae.dataset.path) { FOCUS_PATH = null; return; }
  FOCUS_PATH = ae.dataset.path;
  if (typeof ae.selectionStart === 'number') FOCUS_SEL = { start: ae.selectionStart, end: ae.selectionEnd };
  else FOCUS_SEL = null;
}
function restoreFocus(){
  if (!FOCUS_PATH) return;
  var el = document.querySelector('[data-path="'+CSS.escape(FOCUS_PATH)+'"]');
  if (!el) return;
  el.focus();
  if (FOCUS_SEL && typeof el.setSelectionRange === 'function') {
    try { el.setSelectionRange(FOCUS_SEL.start, FOCUS_SEL.end); } catch(e){}
  }
}

// ── Render: Top tabs + sidebar + content ────────────────────────────
function render(opts){
  opts = opts || {};
  if (opts.preserveFocus) captureFocus();
  renderProdTabs();
  renderSideNav();
  renderMain();
  if (opts.preserveFocus) restoreFocus();
}

function renderProdTabs(){
  var c = document.getElementById('prodTabs');
  c.innerHTML = '';
  if (!STATE) return;
  STATE.products.forEach(function(p){
    var t = el('button', {
      class: 'ptab' + (p.id === ACTIVE_PRODUCT ? ' on' : ''),
      data: { id: p.id },
      on: { click: function(e){
        if (e.target.classList.contains('menu')) return;
        ACTIVE_PRODUCT = p.id; render();
      }}
    });
    t.appendChild(el('span', { html: '📐 ' + escHtml(p.name || 'Unbenannt') }));
    t.appendChild(el('span', {
      class: 'menu', html: '⋯', title: 'Optionen',
      on: { click: function(e){ e.stopPropagation(); openProductMenu(p); }}
    }));
    c.appendChild(t);
  });
}

function renderSideNav(){
  var c = document.getElementById('sideNav');
  c.innerHTML = '';
  var p = getActiveProduct();
  if (!p) return;

  var groups = {};
  SECTIONS.forEach(function(s){
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  Object.keys(groups).forEach(function(g){
    c.appendChild(el('div', { class: 'sn-group', html: g }));
    groups[g].forEach(function(s){
      var filled = isSectionFilled(p, s);
      var item = el('div', {
        class: 'sn-item' + (s.id === ACTIVE_SECTION ? ' on' : '') + (filled ? '' : ' empty'),
        on: { click: function(){ ACTIVE_SECTION = s.id; render(); }}
      });
      item.appendChild(el('span', { class: 'ico', html: s.icon }));
      item.appendChild(el('span', { class: 'lbl', html: escHtml(s.label.replace(/^\d+\.\s+/, '')) }));
      if (filled) item.appendChild(el('span', { class: 'check', html: '✓' }));
      c.appendChild(item);
    });
  });
}

function isSectionFilled(p, s){
  if (s.custom){
    if (s.id === 'measurements'){
      return p.measurements && p.measurements.rows.some(function(r){ return Object.keys(r.values||{}).some(function(k){ return r.values[k]; }); });
    }
    if (s.id === 'labels'){
      return ['hangtag','care','main','extra'].some(function(k){
        var L = p.labels[k] || {};
        return (L.images && L.images.length) || L.note || L.text || L.dimensions;
      });
    }
    if (s.id === 'extraInfo'){
      return (p.extraInfo.fitLook && p.extraInfo.fitLook.length) || (p.extraInfo.washedLook && p.extraInfo.washedLook.length) || p.extraInfo.note;
    }
    if (s.id === 'pricing'){
      return p.pricing.items.some(function(i){ return i.amount > 0; }) || p.pricing.salesPrice > 0;
    }
    if (s.id === 'production'){
      return p.production.status !== 'briefing' || p.production.sampleOrder || p.production.notes;
    }
    return false;
  }
  var data = p.sections[s.id];
  if (!data) return false;
  if (data.images && data.images.length) return true;
  if (data.note) return true;
  return (s.fields||[]).some(function(f){ return data[f.key]; });
}

function renderMain(){
  var m = document.getElementById('main');
  m.innerHTML = '';
  if (!STATE || !STATE.products.length){
    m.appendChild(el('div', {class:'empty-state', html:
      '<div class="big">📐</div><div>Noch kein Produkt angelegt. Klicke „+ Produkt" oben.</div>'}));
    return;
  }
  var p = getActiveProduct();
  if (!p) return;

  // For print mode, render ALL sections of the active product
  // For screen, just render the active section
  var sec = SECTIONS_BY_ID[ACTIVE_SECTION] || SECTIONS[0];

  // Active section header + body
  var head = el('header');
  head.appendChild(el('h1', { html: '<span class="ico">'+sec.icon+'</span>'+escHtml(sec.label) }));
  if (sec.sub) head.appendChild(el('div', { class: 'sub', html: escHtml(sec.sub) }));
  m.appendChild(head);

  // Dispatch
  var body = el('div');
  if (sec.custom){
    if (sec.id === 'measurements') renderMeasurements(body, p);
    else if (sec.id === 'labels') renderLabels(body, p);
    else if (sec.id === 'extraInfo') renderExtraInfo(body, p);
    else if (sec.id === 'pricing') renderPricing(body, p);
    else if (sec.id === 'production') renderProduction(body, p);
  } else {
    renderStandardSection(body, p, sec);
  }
  m.appendChild(body);

  // Hidden print-mirror: render all other sections so Cmd+P prints the full Tech Pack
  var printMirror = el('div', { style: 'display:none' });
  printMirror.id = 'printMirror';
  SECTIONS.forEach(function(otherSec){
    if (otherSec.id === sec.id) return;
    var ps = el('section', { class: 'print-section' });
    ps.appendChild(el('h1', { html: '<span class="ico">'+otherSec.icon+'</span>'+escHtml(otherSec.label) }));
    if (otherSec.sub) ps.appendChild(el('div', { class: 'sub', html: escHtml(otherSec.sub) }));
    if (otherSec.custom){
      if (otherSec.id === 'measurements') renderMeasurements(ps, p);
      else if (otherSec.id === 'labels') renderLabels(ps, p);
      else if (otherSec.id === 'extraInfo') renderExtraInfo(ps, p);
      else if (otherSec.id === 'pricing') renderPricing(ps, p);
      else if (otherSec.id === 'production') renderProduction(ps, p);
    } else {
      renderStandardSection(ps, p, otherSec);
    }
    printMirror.appendChild(ps);
  });
  m.appendChild(printMirror);

  // Show print-mirror only during printing (CSS handles this with print media query — see below)
}

// ── Standard Section Renderer ───────────────────────────────────────
function renderStandardSection(parent, product, sec){
  var data = product.sections[sec.id];
  if (!data){ data = product.sections[sec.id] = { images:[], note:'' }; (sec.fields||[]).forEach(function(f){ data[f.key] = data[f.key] || ''; }); }

  var fg = el('div', { class: 'fg cols-' + (sec.cols || 2) });
  (sec.fields||[]).forEach(function(f){
    var fld = el('div', { class: 'field', style: f.col === 2 ? 'grid-column: span 2' : (f.col === 3 ? 'grid-column: span 3' : '') });
    fld.appendChild(el('label', { html: escHtml(f.label) }));
    var path = product.id + '.sections.' + sec.id + '.' + f.key;
    var input = el('input', {
      type: f.type || 'text',
      value: data[f.key] || '',
      placeholder: f.placeholder || '',
      data: { path: path },
      on: { input: function(e){ data[f.key] = e.target.value; scheduleSave(); }}
    });
    fld.appendChild(input);
    if (f.presets && f.presets.length){
      var pr = el('div', { class: 'preset-row' });
      f.presets.forEach(function(pv){
        pr.appendChild(el('button', {
          class: 'preset', html: escHtml(pv),
          on: { click: function(){ data[f.key] = pv; input.value = pv; scheduleSave(); }}
        }));
      });
      fld.appendChild(pr);
    }
    fg.appendChild(fld);
  });
  parent.appendChild(fg);

  if (sec.images){
    parent.appendChild(renderGallery(data, sec.images.label || 'Bilder', product.id + '.sections.' + sec.id + '.images'));
  }

  // Extra Note
  var noteFld = el('div', { class: 'field', style: 'margin-top:18px' });
  noteFld.appendChild(el('label', { html: 'Extra Note' }));
  noteFld.appendChild(el('textarea', {
    placeholder: 'Notizen, Hinweise, alles was den Hersteller interessieren könnte…',
    data: { path: product.id + '.sections.' + sec.id + '.note' },
    html: escHtml(data.note || ''),
    on: { input: function(e){ data.note = e.target.value; scheduleSave(); }}
  }));
  parent.appendChild(noteFld);
}

// ── Image Gallery ───────────────────────────────────────────────────
function renderGallery(host, label, pathPrefix, arrKey){
  // host: object that owns the .images array (or whatever arrKey)
  arrKey = arrKey || 'images';
  if (!Array.isArray(host[arrKey])) host[arrKey] = [];

  var wrap = el('div', { class: 'gal' });
  wrap.appendChild(el('div', { class: 'gal-label', html: escHtml(label) }));

  var dz = el('label', { class: 'dropzone' });
  dz.appendChild(el('div', { html: '<button type="button" class="upload-btn">📁 Hochladen</button>' }));
  dz.appendChild(el('div', { class: 'info', html: 'Drag & Drop oder klicken — auch Strg+V einfügen' }));
  var fi = el('input', { type: 'file', accept: 'image/*', multiple: '' });
  fi.style.display = 'none';
  fi.addEventListener('change', function(e){
    Array.from(e.target.files).forEach(function(f){
      compress(f, function(src){ host[arrKey].push(src); scheduleSave(); render({preserveFocus:true}); });
    });
    fi.value = '';
  });
  dz.appendChild(fi);
  // Clicking the upload-btn triggers file picker
  dz.addEventListener('click', function(e){
    if (e.target.tagName === 'BUTTON' || e.target === dz) fi.click();
  });
  // Drag & drop
  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e){
    e.preventDefault(); dz.classList.remove('over');
    var files = Array.from(e.dataTransfer.files || []).filter(function(f){ return f.type.startsWith('image/'); });
    if (files.length){
      files.forEach(function(f){ compress(f, function(src){ host[arrKey].push(src); scheduleSave(); render({preserveFocus:true}); }); });
      return;
    }
    var html = e.dataTransfer.getData('text/html');
    var m = html && (html.match(/src=["']([^"']+\.(?:jpg|jpeg|png|webp|gif)[^"']*)["']/i) || html.match(/src=["']([^"']+pinimg\.com[^"']+)["']/i));
    if (m && m[1]){ host[arrKey].push(m[1]); scheduleSave(); render({preserveFocus:true}); return; }
    var url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
    if (url && url.trim().startsWith('http')){ host[arrKey].push(url.trim()); scheduleSave(); render({preserveFocus:true}); }
  });
  wrap.appendChild(dz);

  if (host[arrKey].length){
    var grid = el('div', { class: 'gal-grid' });
    host[arrKey].forEach(function(src, idx){
      var item = el('div', { class: 'gal-item', on: { click: function(e){ if(e.target.classList.contains('del')) return; openLb(src); }}});
      item.appendChild(el('img', { src: src, loading: 'lazy' }));
      item.appendChild(el('button', {
        class: 'del', html: '✕', title: 'Bild entfernen',
        on: { click: function(e){ e.stopPropagation(); host[arrKey].splice(idx, 1); scheduleSave(); render({preserveFocus:true}); }}
      }));
      grid.appendChild(item);
    });
    wrap.appendChild(grid);
  }
  return wrap;
}

function compress(file, cb, maxW){
  maxW = maxW || 2000;
  var r = new FileReader();
  r.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var w = img.width, h = img.height;
      if (w > maxW){ h = Math.round(h * maxW/w); w = maxW; }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.9));
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

// Paste support
document.addEventListener('paste', function(e){
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  // Only handle if active section has images
  var sec = SECTIONS_BY_ID[ACTIVE_SECTION];
  var p = getActiveProduct(); if (!p) return;
  var target = null;
  if (sec && sec.images && p.sections[sec.id]) target = p.sections[sec.id];
  else if (ACTIVE_SECTION === 'measurements') target = p.measurements;
  // For paste we just default to start section if active section has no gallery
  if (!target && p.sections.start) target = p.sections.start;
  if (!target) return;

  for (var i=0; i<items.length; i++){
    if (items[i].type.startsWith('image/')){
      var f = items[i].getAsFile();
      if (f) compress(f, function(src){
        if (!Array.isArray(target.images)) target.images = [];
        target.images.push(src); scheduleSave(); render({preserveFocus:true});
      });
      return;
    }
  }
});

// ── MEASUREMENTS Section ────────────────────────────────────────────
function renderMeasurements(parent, product){
  var m = product.measurements;
  if (!m.sizes || !m.sizes.length) m.sizes = ['XS','S','M','L','XL','XXL'];
  if (!m.rows || !m.rows.length) m.rows = DEFAULT_MEASURE_LABELS.map(function(l){ return {label:l, values:{}}; });

  // Sizes config row
  parent.appendChild(el('div', { class: 'gal-label', html: 'Größen' }));
  var sizes = el('div', { class: 'size-cfg' });
  ['XS','S','M','L','XL','XXL','3XL','4XL'].forEach(function(sz){
    var on = m.sizes.indexOf(sz) !== -1;
    sizes.appendChild(el('button', {
      class: 'size-pill' + (on ? ' on' : ''),
      html: escHtml(sz),
      on: { click: function(){
        if (on) m.sizes = m.sizes.filter(function(x){ return x !== sz; });
        else { m.sizes.push(sz); m.sizes.sort(function(a,b){
          var order = {XS:0,S:1,M:2,L:3,XL:4,XXL:5,'3XL':6,'4XL':7};
          return (order[a]||99) - (order[b]||99);
        }); }
        scheduleSave(); render({preserveFocus:true});
      }}
    }));
  });
  parent.appendChild(sizes);

  // Measurement table
  var tbl = el('div', { class: 'measure', style: 'margin-top:14px' });
  var head = el('div', { class: 'measure-row head' });
  var cols = '180px ' + m.sizes.map(function(){ return '1fr'; }).join(' ') + ' 32px';
  head.style.gridTemplateColumns = cols;
  head.appendChild(el('div', { html: 'Punkt / Maß' }));
  m.sizes.forEach(function(sz){ head.appendChild(el('div', { html: escHtml(sz) })); });
  head.appendChild(el('div'));
  tbl.appendChild(head);

  m.rows.forEach(function(row, idx){
    var r = el('div', { class: 'measure-row' });
    r.style.gridTemplateColumns = cols;
    r.appendChild(el('input', {
      class: 'label-input', type: 'text',
      value: row.label || '', placeholder: 'Punkt #' + (idx+1),
      data: { path: product.id + '.measurements.rows.' + idx + '.label' },
      on: { input: function(e){ row.label = e.target.value; scheduleSave(); }}
    }));
    m.sizes.forEach(function(sz){
      r.appendChild(el('input', {
        type: 'text',
        value: (row.values && row.values[sz]) || '', placeholder: '–',
        data: { path: product.id + '.measurements.rows.' + idx + '.values.' + sz },
        on: { input: function(e){
          if (!row.values) row.values = {};
          row.values[sz] = e.target.value; scheduleSave();
        }}
      }));
    });
    r.appendChild(el('div', {
      class: 'del-row', html: '✕', title: 'Zeile löschen',
      on: { click: function(){ m.rows.splice(idx,1); scheduleSave(); render(); }}
    }));
    tbl.appendChild(r);
  });
  parent.appendChild(tbl);

  parent.appendChild(el('button', {
    class: 'btn-add', html: '+ Maß-Punkt hinzufügen', style: 'margin-top:8px',
    on: { click: function(){ m.rows.push({ label:'', values:{} }); scheduleSave(); render(); }}
  }));

  parent.appendChild(renderGallery(m, 'Mockup mit Maßangaben (markierte Punkte)', product.id + '.measurements.images'));

  var noteFld = el('div', { class: 'field', style: 'margin-top:18px' });
  noteFld.appendChild(el('label', { html: 'Extra Note' }));
  noteFld.appendChild(el('textarea', {
    placeholder: 'Toleranzen, gradings, weitere Hinweise…',
    data: { path: product.id + '.measurements.note' },
    html: escHtml(m.note || ''),
    on: { input: function(e){ m.note = e.target.value; scheduleSave(); }}
  }));
  parent.appendChild(noteFld);
}

// ── LABELS Section ──────────────────────────────────────────────────
function renderLabels(parent, product){
  var L = product.labels;
  ['hangtag','care','main','extra'].forEach(function(k){
    if (!L[k]) L[k] = { images: [], note: '', text: '', dimensions: '' };
  });

  var grid = el('div', { class: 'fg cols-2' });
  // Hangtag
  grid.appendChild(buildLabelBlock('🏷 Hangtag', L.hangtag, product.id + '.labels.hangtag', { withDimensions: true }));
  // Care label
  grid.appendChild(buildLabelBlock('🧺 Care Label', L.care, product.id + '.labels.care', { withText: true }));
  // Main label
  grid.appendChild(buildLabelBlock('Ⓜ Main Label', L.main, product.id + '.labels.main'));
  // Extra label
  grid.appendChild(buildLabelBlock('+ Extra Label', L.extra, product.id + '.labels.extra'));
  parent.appendChild(grid);
}
function buildLabelBlock(title, obj, pathPrefix, opts){
  opts = opts || {};
  var block = el('div', { class: 'price-stat', style: 'padding:14px' });
  block.appendChild(el('div', { class: 'lbl', style: 'font-size:11px;margin-bottom:8px', html: escHtml(title) }));
  if (opts.withDimensions){
    block.appendChild(el('div', { class: 'field', style: 'margin-bottom:8px' }, [
      el('label', { html: 'Maße' }),
      el('input', {
        type: 'text', value: obj.dimensions || '', placeholder: 'z.B. 4cm × 10cm',
        data: { path: pathPrefix + '.dimensions' },
        on: { input: function(e){ obj.dimensions = e.target.value; scheduleSave(); }}
      })
    ]));
  }
  if (opts.withText){
    block.appendChild(el('div', { class: 'field', style: 'margin-bottom:8px' }, [
      el('label', { html: 'Pflicht-Text' }),
      el('textarea', {
        placeholder: 'Material, Wash-Anweisungen, Made in …',
        data: { path: pathPrefix + '.text' },
        html: escHtml(obj.text || ''),
        on: { input: function(e){ obj.text = e.target.value; scheduleSave(); }}
      })
    ]));
  }
  block.appendChild(renderGallery(obj, 'Bilder', pathPrefix + '.images'));
  block.appendChild(el('div', { class: 'field', style: 'margin-top:10px' }, [
    el('label', { html: 'Notiz' }),
    el('textarea', {
      placeholder: 'Position, Befestigung, Druck-Methode …',
      data: { path: pathPrefix + '.note' },
      html: escHtml(obj.note || ''),
      on: { input: function(e){ obj.note = e.target.value; scheduleSave(); }}
    })
  ]));
  return block;
}

// ── PRICING Section ─────────────────────────────────────────────────
function renderPricing(parent, product){
  var P = product.pricing;
  if (!P.items) P.items = [];

  parent.appendChild(el('div', { class: 'gal-label', html: 'Kostenpositionen pro Stück (€)' }));
  var list = el('div', { class: 'price-list' });
  P.items.forEach(function(item, idx){
    var row = el('div', { class: 'price-row' });
    row.appendChild(el('input', {
      type: 'text', value: item.label || '', placeholder: 'Position',
      data: { path: product.id + '.pricing.items.' + idx + '.label' },
      on: { input: function(e){ item.label = e.target.value; scheduleSave(); }}
    }));
    row.appendChild(el('input', {
      type: 'number', step: '0.01', value: item.amount || '', placeholder: '€',
      data: { path: product.id + '.pricing.items.' + idx + '.amount' },
      on: { input: function(e){ item.amount = parseFloat(e.target.value) || 0; scheduleSave(); refreshPricingSummary(product); }}
    }));
    row.appendChild(el('div', {
      class: 'del', html: '✕', title: 'Zeile löschen',
      on: { click: function(){ P.items.splice(idx,1); scheduleSave(); render(); }}
    }));
    list.appendChild(row);
  });
  parent.appendChild(list);

  parent.appendChild(el('button', {
    class: 'btn-add', html: '+ Kostenposition',
    on: { click: function(){ P.items.push({ label:'', amount:0 }); scheduleSave(); render(); }}
  }));

  // Quantity + Sales Price
  var fg = el('div', { class: 'fg cols-2', style: 'margin-top:14px' });
  fg.appendChild(el('div', { class: 'field' }, [
    el('label', { html: 'Bestellmenge (Stück)' }),
    el('input', {
      type: 'number', step: '1', value: P.quantity || '', placeholder: '100',
      data: { path: product.id + '.pricing.quantity' },
      on: { input: function(e){ P.quantity = parseInt(e.target.value) || 0; scheduleSave(); refreshPricingSummary(product); }}
    })
  ]));
  fg.appendChild(el('div', { class: 'field' }, [
    el('label', { html: 'Verkaufspreis pro Stück (€)' }),
    el('input', {
      type: 'number', step: '0.01', value: P.salesPrice || '', placeholder: '69.90',
      data: { path: product.id + '.pricing.salesPrice' },
      on: { input: function(e){ P.salesPrice = parseFloat(e.target.value) || 0; scheduleSave(); refreshPricingSummary(product); }}
    })
  ]));
  parent.appendChild(fg);

  parent.appendChild(buildPricingSummary(product));
}
function refreshPricingSummary(product){
  var s = document.getElementById('priceSummary');
  if (!s) return;
  var n = buildPricingSummary(product);
  s.replaceWith(n);
}
function buildPricingSummary(product){
  var P = product.pricing;
  var costPerUnit = (P.items || []).reduce(function(s,i){ return s + (parseFloat(i.amount)||0); }, 0);
  var orderTotal = costPerUnit * (P.quantity || 0);
  var profit = (P.salesPrice || 0) - costPerUnit;
  var marginPct = (P.salesPrice || 0) > 0 ? Math.round(profit / P.salesPrice * 100) : 0;
  var marginClass = marginPct >= 60 ? 'good' : (marginPct >= 30 ? 'brand' : 'warn');

  var sum = el('div', { class: 'price-summary', id: 'priceSummary' });
  function stat(lbl, val, cls){
    var s = el('div', { class: 'price-stat' });
    s.appendChild(el('div', { class: 'lbl', html: lbl }));
    s.appendChild(el('div', { class: 'val ' + (cls||''), html: val }));
    return s;
  }
  sum.appendChild(stat('Kosten / Stück', '€ ' + costPerUnit.toFixed(2), 'brand'));
  sum.appendChild(stat('Order Total', '€ ' + orderTotal.toFixed(2), 'brand'));
  sum.appendChild(stat('Profit / Stück', '€ ' + profit.toFixed(2), profit >= 0 ? 'good' : 'warn'));
  sum.appendChild(stat('Marge', marginPct + ' %', marginClass));
  return sum;
}

// ── PRODUCTION Section ──────────────────────────────────────────────
function renderProduction(parent, product){
  var P = product.production;

  // Status flow
  parent.appendChild(el('div', { class: 'gal-label', html: 'Status — wo stehen wir?' }));
  var flow = el('div', { class: 'status-flow' });
  var passedReached = false;
  var stepIdx = STATUS_STEPS.findIndex(function(s){ return s.id === P.status; });
  STATUS_STEPS.forEach(function(s, i){
    var cls = '';
    if (s.id === P.status) cls = ' on';
    else if (i < stepIdx) cls = ' passed';
    flow.appendChild(el('button', {
      class: 'status-step' + cls,
      html: '<span class="num">'+(i+1)+'</span>'+escHtml(s.label),
      on: { click: function(){ P.status = s.id; scheduleSave(); render(); }}
    }));
  });
  parent.appendChild(flow);

  // Date fields
  var fg = el('div', { class: 'fg cols-2' });
  function dateField(key, label, hint){
    var fld = el('div', { class: 'field' });
    fld.appendChild(el('label', { html: escHtml(label) }));
    fld.appendChild(el('input', {
      type: 'date', value: P[key] || '',
      data: { path: product.id + '.production.' + key },
      on: { input: function(e){ P[key] = e.target.value; scheduleSave(); }}
    }));
    if (hint) fld.appendChild(el('div', { class: 'hint', html: escHtml(hint) }));
    return fld;
  }
  fg.appendChild(dateField('sampleOrder', 'Sample bestellt am', ''));
  fg.appendChild(dateField('sampleReceived', 'Sample erhalten am', ''));
  fg.appendChild(dateField('bulkOrder', 'Bulk bestellt am', ''));
  fg.appendChild(dateField('bulkReceived', 'Bulk erhalten am', ''));
  fg.appendChild(dateField('shipping', 'Versand am', ''));
  parent.appendChild(fg);

  // Tracking + notes
  var fg2 = el('div', { class: 'fg cols-1', style: 'margin-top:6px' });
  fg2.appendChild(el('div', { class: 'field' }, [
    el('label', { html: 'Tracking-URL' }),
    el('input', {
      type: 'url', value: P.tracking || '', placeholder: 'https://…',
      data: { path: product.id + '.production.tracking' },
      on: { input: function(e){ P.tracking = e.target.value; scheduleSave(); }}
    })
  ]));
  fg2.appendChild(el('div', { class: 'field' }, [
    el('label', { html: 'Notizen / Kommunikation' }),
    el('textarea', {
      placeholder: 'Was wurde besprochen, welche Anpassungen, etc.',
      data: { path: product.id + '.production.notes' },
      html: escHtml(P.notes || ''),
      style: 'min-height: 100px',
      on: { input: function(e){ P.notes = e.target.value; scheduleSave(); }}
    })
  ]));
  parent.appendChild(fg2);
}

// ── Product Menu (rename / clone / delete) ──────────────────────────
function openProductMenu(p){
  showModalChoice('Produkt bearbeiten', escHtml(p.name), [
    { label: '✏ Umbenennen', action: function(){
      askText('Neuer Name', p.name, function(v){ if (v){ p.name = v; scheduleSave(); render(); }});
    }},
    { label: '⎘ Klonen', action: function(){
      var clone = JSON.parse(JSON.stringify(p));
      clone.id = uid();
      clone.name = (p.name || 'Produkt') + ' (Kopie)';
      STATE.products.push(clone);
      ACTIVE_PRODUCT = clone.id;
      scheduleSave(); render();
      toast('Produkt geklont ✓');
    }},
    { label: '🗑 Löschen', cls: 'danger', action: function(){
      if (STATE.products.length <= 1){ toast('Mindestens 1 Produkt muss bleiben'); return; }
      if (!confirm('„'+(p.name||'?')+'" wirklich löschen? Alle Sektionen, Bilder und Notizen gehen verloren.')) return;
      STATE.products = STATE.products.filter(function(x){ return x.id !== p.id; });
      ACTIVE_PRODUCT = STATE.products[0].id;
      scheduleSave(); render();
    }},
  ]);
}

// ── Modal helpers ───────────────────────────────────────────────────
var modalResolve = null;
var modalOverlay = document.getElementById('modalOverlay');
var modalTitle = document.getElementById('modalTitle');
var modalDesc = document.getElementById('modalDesc');
var modalInput = document.getElementById('modalInput');
var modalOk = document.getElementById('modalOk');
var modalCancel = document.getElementById('modalCancel');

modalCancel.addEventListener('click', function(){ closeModal(null); });
modalOverlay.addEventListener('click', function(e){ if (e.target === modalOverlay) closeModal(null); });
modalOk.addEventListener('click', function(){ closeModal(modalInput.style.display === 'none' ? true : modalInput.value.trim()); });
modalInput.addEventListener('keydown', function(e){ if (e.key === 'Enter'){ e.preventDefault(); modalOk.click(); }});

function closeModal(v){
  modalOverlay.classList.remove('open');
  if (modalResolve){ var r = modalResolve; modalResolve = null; r(v); }
}
function askText(title, value, cb){
  modalTitle.textContent = title;
  modalDesc.textContent = '';
  modalDesc.style.display = 'none';
  modalInput.style.display = '';
  modalInput.value = value || '';
  modalOk.textContent = 'OK';
  modalCancel.textContent = 'Abbrechen';
  modalOverlay.classList.add('open');
  setTimeout(function(){ modalInput.focus(); modalInput.select(); }, 30);
  modalResolve = cb;
}
function showModalChoice(title, desc, choices){
  // Simple multi-choice menu — we implement by replacing modal-actions
  modalTitle.textContent = title;
  modalDesc.innerHTML = desc;
  modalDesc.style.display = 'block';
  modalInput.style.display = 'none';
  modalOverlay.classList.add('open');
  // Custom action area
  var actions = modalOverlay.querySelector('.modal-actions');
  actions.innerHTML = '';
  choices.forEach(function(c){
    actions.appendChild(el('button', {
      class: 'btn ' + (c.cls || ''), html: c.label,
      style: 'flex:1; justify-content:center',
      on: { click: function(){ modalOverlay.classList.remove('open'); resetActions(); c.action(); }}
    }));
  });
  actions.appendChild(el('button', { class:'btn', html:'Abbrechen', on: { click: function(){ modalOverlay.classList.remove('open'); resetActions(); }}}));
}
function resetActions(){
  var actions = modalOverlay.querySelector('.modal-actions');
  actions.innerHTML = '';
  actions.appendChild(modalCancel);
  actions.appendChild(modalOk);
  modalCancel.style.flex = '1'; modalOk.style.flex = '1';
}

  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}
