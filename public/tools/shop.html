<!DOCTYPE html>
<html lang="de">
<head>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var _R = new URLSearchParams(location.search).get('room'), _D = null;
try {
  if (!firebase.apps.length) firebase.initializeApp({apiKey:"AIzaSyDJqdh3apGM4fcsjRYI7vZ4VrT1_A6L92U",authDomain:"unsignedworkspace.firebaseapp.com",databaseURL:"https://unsignedworkspace-default-rtdb.europe-west1.firebasedatabase.app",projectId:"unsignedworkspace",storageBucket:"unsignedworkspace.firebasestorage.app",messagingSenderId:"144491079509",appId:"1:144491079509:web:c7dcc1c14b8daf404231dc"});
  _D = firebase.database();
} catch (e) { try { _D = firebase.database(); } catch (e2) {} }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsigned — Brandwork Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C13030;
  --red-dark: #9A2424;
  --red-dim: rgba(193, 48, 48, 0.08);
  --bg: #f4f3f0;
  --bg2: #fff;
  --bg3: #eee;
  --border: rgba(0, 0, 0, 0.09);
  --border-red: rgba(193, 48, 48, 0.35);
  --text: #111;
  --text-dim: #555;
  --text-dimmer: #aaa;
  --green: #1D9E75;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }
.header { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06); }
.header-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
.brand-wm { display: flex; align-items: baseline; gap: 6px; }
.brand-wm .bw { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -0.02em; color: var(--text); font-style: italic; }
.brand-wm .sh { font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px; color: var(--red); transform: translateY(2px); }
.header-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }
.progress-wrap { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.progress-bar-bg { width: 110px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
.progress-count { font-size: 12px; font-weight: 800; color: var(--red); min-width: 38px; text-align: right; }

.main { max-width: 820px; margin: 0 auto; padding: 24px 24px 0; }
.intro { background: var(--red-dim); border: 1px solid var(--border-red); border-radius: 12px; padding: 14px 18px; margin-bottom: 22px; }
.intro p { font-size: 12px; line-height: 1.55; color: var(--red-dark); font-weight: 600; }

.phase { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
.phase.complete { border-color: rgba(29, 158, 117, 0.4); }
.phase-head { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.phase-num { font-size: 22px; font-weight: 900; font-style: italic; color: var(--text-dimmer); min-width: 28px; line-height: 1; }
.phase.complete .phase-num { color: var(--green); }
.phase-titlewrap { flex: 1; min-width: 0; }
.phase-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; color: var(--text); border-bottom: 2px solid var(--text); padding-bottom: 2px; display: inline-block; }
.phase.complete .phase-title { border-bottom-color: var(--green); }
.phase-meta { font-size: 10px; font-weight: 600; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.05em; }
.phase-pct { font-size: 11px; font-weight: 800; color: var(--red); min-width: 36px; text-align: right; }
.phase.complete .phase-pct { color: var(--green); }
.phase-chev { width: 14px; height: 14px; color: var(--text-dimmer); transition: transform 0.2s; flex-shrink: 0; }
.phase[data-open="false"] .phase-chev { transform: rotate(-90deg); }
.phase[data-open="false"] .phase-body { display: none; }
.phase-body { padding: 4px 20px 18px; border-top: 1px solid var(--border); }

.item { display: flex; flex-direction: column; gap: 0; padding: 12px 0; border-bottom: 1px dashed rgba(0,0,0,0.05); }
.item:last-child { border-bottom: 0; padding-bottom: 0; }
.item-row { display: flex; align-items: center; gap: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.check { width: 22px; height: 22px; border: 2px solid var(--text-dimmer); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: #fff; }
.check svg { width: 12px; height: 10px; opacity: 0; transition: opacity 0.15s; }
.item.done .check { background: var(--red); border-color: var(--red); }
.item.done .check svg { opacity: 1; }
.item-text { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; }
.item.done .item-text { color: var(--text-dimmer); text-decoration: line-through; text-decoration-color: var(--red-dark); }
.item-toggle { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: var(--text-dim); background: var(--bg3); border-radius: 12px; padding: 3px 9px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: background 0.15s; flex-shrink: 0; border: 0; font-family: inherit; }
.item-toggle:hover { background: rgba(193, 48, 48, 0.1); color: var(--red); }
.item-toggle.has-notes { background: var(--red-dim); color: var(--red); }
.item-notes { display: none; margin-top: 10px; margin-left: 34px; }
.item[data-notes-open="true"] .item-notes { display: block; }
.item-notes textarea { width: 100%; min-height: 70px; resize: vertical; font-family: inherit; font-size: 12px; line-height: 1.5; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; outline: none; transition: border-color 0.15s; }
.item-notes textarea:focus { border-color: var(--border-red); background: #fff; }

.foot { max-width: 820px; margin: 24px auto 0; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.foot-status { font-size: 11px; color: var(--text-dimmer); font-weight: 600; }
.foot-status .saved { color: var(--green); opacity: 0; transition: opacity 0.3s; }
.foot-status .saved.show { opacity: 1; }
.foot-reset { background: transparent; border: 0; font-family: inherit; font-size: 11px; font-weight: 700; color: var(--text-dim); cursor: pointer; padding: 6px 10px; border-radius: 6px; }
.foot-reset:hover { color: var(--red); background: var(--red-dim); }

@media (max-width: 540px) {
  .header { padding: 14px 16px; }
  .main { padding: 16px 16px 0; }
  .foot { padding: 0 16px; }
  .phase-head { padding: 14px 16px; }
  .phase-body { padding: 4px 16px 14px; }
  .item-notes { margin-left: 0; }
}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div>
      <div class="brand-wm"><span class="bw">Brandwork</span><span class="sh">Shop</span></div>
      <div class="header-eyebrow">Shop-Optimierung &amp; Drop-Planung</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div id="progFill" class="progress-bar-fill"></div></div>
      <span id="progCount" class="progress-count">0%</span>
    </div>
  </div>
</header>

<main class="main">
  <div class="intro">
    <p>Vier Phasen — von der ersten Besprechung bis zum laufenden Drop. Häkchen setzen, Notizen pro Punkt hinterlegen, alles live mit deinem Team geteilt.</p>
  </div>
  <div id="phases"></div>
</main>

<div class="foot">
  <span class="foot-status">
    <span id="savedTag" class="saved">✓ Gespeichert</span>
    <span id="connTag"></span>
  </span>
  <button id="resetBtn" type="button" class="foot-reset">Alle Häkchen zurücksetzen</button>
</div>

<script>
(function () {
  var PHASES = [
    {
      key: 'p1', num: '01', title: 'Shop Besprechung', sub: 'Status quo & Richtung',
      items: [
        { key: 'i1', text: 'Aktueller Stand', placeholder: 'Wo steht der Shop heute? Was läuft, was nicht?' },
        { key: 'i2', text: 'Grund Look', placeholder: 'Welcher Look / welches Vibe soll der Shop transportieren?' },
        { key: 'i3', text: 'Nächste Schritte', placeholder: 'Was sind die ersten Maßnahmen, in welcher Reihenfolge?' },
      ],
    },
    {
      key: 'p2', num: '02', title: 'Optimierung', sub: 'Vom Grundgerüst zur Finalisierung',
      items: [
        { key: 'i1', text: 'Grundgerüst', placeholder: 'Navigation, Kategorien, Footer — die Basis steht.' },
        { key: 'i2', text: 'Aufbau', placeholder: 'Startseite, Kollektions-Seiten, PDP — Struktur greifbar.' },
        { key: 'i3', text: 'Anpassungen', placeholder: 'Feintuning: Spacing, Typo, Bilder, Texte.' },
        { key: 'i4', text: 'Finalisierung', placeholder: 'Letzter Check — alles live-ready.' },
      ],
    },
    {
      key: 'p3', num: '03', title: 'Shop Planung — Drop-bezogen', sub: 'Pro Release sauber vorbereiten',
      items: [
        { key: 'i1', text: 'Worauf achten', placeholder: 'Was ist beim aktuellen Drop besonders wichtig?' },
        { key: 'i2', text: 'Shop Bilder', placeholder: 'Welche Bilder brauchen wir? Wo werden sie platziert?' },
        { key: 'i3', text: 'Anpassungen', placeholder: 'Welche Drop-spezifischen Änderungen am Shop sind nötig?' },
      ],
    },
    {
      key: 'p4', num: '04', title: 'Flats', sub: 'Die richtigen Produkt-Shots',
      items: [
        { key: 'i1', text: 'Worauf achten', placeholder: 'Lichtsetup, Hintergrund, Winkel, Konsistenz…' },
        { key: 'i2', text: 'Wie erstellen', placeholder: 'Workflow: Shooting, Bearbeitung, Export, Upload.' },
      ],
    },
  ];

  var STATE = {};
  PHASES.forEach(function (p) {
    STATE[p.key] = {};
    p.items.forEach(function (it) { STATE[p.key][it.key] = { d: false, n: '' }; });
  });

  var TOTAL_ITEMS = PHASES.reduce(function (a, p) { return a + p.items.length; }, 0);
  var phasesEl = document.getElementById('phases');
  var progFill = document.getElementById('progFill');
  var progCount = document.getElementById('progCount');
  var savedTag = document.getElementById('savedTag');
  var connTag = document.getElementById('connTag');
  var resetBtn = document.getElementById('resetBtn');

  // DOM cache: phaseKey → { sec, body, head, pctEl, metaEl, items: { itemKey → {item, check, ta, btn} } }
  var DOM = {};

  function el(tag, cls, parent) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (parent) parent.appendChild(e);
    return e;
  }

  function buildCheckSvg(parent) {
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 12 10');
    svg.setAttribute('fill', 'none');
    var path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', 'M1 5L4.5 8.5L11 1.5');
    path.setAttribute('stroke', 'white');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
    parent.appendChild(svg);
  }
  function buildChevSvg(parent) {
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'phase-chev');
    svg.setAttribute('viewBox', '0 0 14 14');
    svg.setAttribute('fill', 'none');
    var path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', 'M3 5l4 4 4-4');
    path.setAttribute('stroke', 'currentColor');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
    parent.appendChild(svg);
  }

  function buildSkeleton() {
    PHASES.forEach(function (p, idx) {
      var sec = el('section', 'phase', phasesEl);
      sec.dataset.phase = p.key;
      sec.dataset.open = idx === 0 ? 'true' : 'false';

      var head = el('div', 'phase-head', sec);
      var num = el('span', 'phase-num', head);
      num.textContent = p.num;
      var tw = el('div', 'phase-titlewrap', head);
      var title = el('div', 'phase-title', tw);
      title.textContent = p.title;
      var meta = el('div', 'phase-meta', tw);
      meta.textContent = p.sub + ' · 0/' + p.items.length;
      var pct = el('span', 'phase-pct', head);
      pct.textContent = '0%';
      buildChevSvg(head);

      head.addEventListener('click', function (e) {
        if (e.target.closest('.item')) return;
        var open = !(sec.dataset.open === 'true');
        sec.dataset.open = open ? 'true' : 'false';
      });

      var body = el('div', 'phase-body', sec);
      var itemsMap = {};
      p.items.forEach(function (it) {
        var item = el('div', 'item', body);
        item.dataset.phase = p.key;
        item.dataset.item = it.key;
        item.dataset.notesOpen = 'false';

        var row = el('div', 'item-row', item);
        var check = el('div', 'check', row);
        buildCheckSvg(check);
        var label = el('div', 'item-text', row);
        label.textContent = it.text;
        var btn = el('button', 'item-toggle', row);
        btn.type = 'button';
        btn.textContent = '✎ Notizen';

        var notesWrap = el('div', 'item-notes', item);
        var ta = el('textarea', null, notesWrap);
        ta.setAttribute('data-field', 'notes');
        ta.placeholder = it.placeholder;

        row.addEventListener('click', function (e) {
          if (e.target === btn || btn.contains(e.target)) return;
          if (e.target === ta) return;
          STATE[p.key][it.key].d = !STATE[p.key][it.key].d;
          item.classList.toggle('done', STATE[p.key][it.key].d);
          persist(p.key, it.key);
          updatePhaseHeader(p.key);
          updateProgress();
        });

        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var open = !(item.dataset.notesOpen === 'true');
          item.dataset.notesOpen = open ? 'true' : 'false';
          btn.textContent = open ? '▾ Notizen' : '✎ Notizen';
          if (open) setTimeout(function () { ta.focus(); }, 50);
        });

        ta.addEventListener('input', function () {
          STATE[p.key][it.key].n = ta.value;
          var hasN = (ta.value || '').trim().length > 0;
          btn.classList.toggle('has-notes', hasN);
          clearTimeout(ta._t);
          ta._t = setTimeout(function () { persist(p.key, it.key); }, 400);
        });

        itemsMap[it.key] = { item: item, check: check, ta: ta, btn: btn };
      });

      DOM[p.key] = { sec: sec, body: body, head: head, pctEl: pct, metaEl: meta, items: itemsMap };
    });
  }

  function updateProgress() {
    var done = 0;
    PHASES.forEach(function (p) {
      p.items.forEach(function (it) { if (STATE[p.key][it.key].d) done++; });
    });
    var pct = Math.round((done / TOTAL_ITEMS) * 100);
    progFill.style.width = pct + '%';
    progCount.textContent = pct + '%';
    if (_R && _D) {
      try { _D.ref('rooms/' + _R + '/shop_pct').set(pct); } catch (e) {}
    }
    try { window.parent && window.parent.postMessage({ type: 'shopPct', pct: pct }, '*'); } catch (e) {}
  }

  function updatePhaseHeader(phaseKey) {
    var entry = DOM[phaseKey];
    var phase = PHASES.find(function (p) { return p.key === phaseKey; });
    var doneIn = phase.items.filter(function (it) { return STATE[phaseKey][it.key].d; }).length;
    var pct = Math.round((doneIn / phase.items.length) * 100);
    var complete = doneIn === phase.items.length;
    entry.sec.classList.toggle('complete', complete);
    entry.pctEl.textContent = pct + '%';
    entry.metaEl.textContent = phase.sub + ' · ' + doneIn + '/' + phase.items.length;
  }

  function showSaved() {
    savedTag.classList.add('show');
    clearTimeout(savedTag._t);
    savedTag._t = setTimeout(function () { savedTag.classList.remove('show'); }, 1400);
  }

  function persist(phaseKey, itemKey) {
    if (!_R || !_D) { showSaved(); return; }
    var s = STATE[phaseKey][itemKey];
    _D.ref('rooms/' + _R + '/shop/' + phaseKey + '/' + itemKey)
      .set({ d: !!s.d, n: s.n || '' })
      .then(function () { showSaved(); })
      .catch(function (e) { connTag.textContent = '⚠ ' + (e.code || e.message); });
  }

  function applyRemote(data) {
    if (!data || typeof data !== 'object') return;
    PHASES.forEach(function (p) {
      var pData = data[p.key] || {};
      p.items.forEach(function (it) {
        var iData = pData[it.key] || {};
        var s = STATE[p.key][it.key];
        var entry = DOM[p.key].items[it.key];
        s.d = !!iData.d;
        entry.item.classList.toggle('done', s.d);
        // Don't clobber a textarea the user is currently typing in.
        if (document.activeElement !== entry.ta) {
          s.n = iData.n || '';
          entry.ta.value = s.n;
          entry.btn.classList.toggle('has-notes', s.n.trim().length > 0);
        } else {
          STATE[p.key][it.key].n = entry.ta.value;
        }
      });
      updatePhaseHeader(p.key);
    });
    updateProgress();
  }

  resetBtn.addEventListener('click', function () {
    if (!confirm('Alle Häkchen in allen Phasen zurücksetzen? Notizen bleiben erhalten.')) return;
    PHASES.forEach(function (p) {
      p.items.forEach(function (it) {
        STATE[p.key][it.key].d = false;
        DOM[p.key].items[it.key].item.classList.remove('done');
      });
      updatePhaseHeader(p.key);
    });
    if (_R && _D) {
      var updates = {};
      PHASES.forEach(function (p) {
        p.items.forEach(function (it) {
          updates[p.key + '/' + it.key + '/d'] = false;
        });
      });
      _D.ref('rooms/' + _R + '/shop').update(updates).catch(function () {});
    }
    updateProgress();
  });

  buildSkeleton();
  updateProgress();

  if (_R && _D) {
    connTag.textContent = '· verbunden';
    _D.ref('rooms/' + _R + '/shop').once('value').then(function (snap) {
      var v = snap.val();
      if (v) applyRemote(v);
      _D.ref('rooms/' + _R + '/shop').on('value', function (s) {
        var v2 = s.val();
        if (v2) applyRemote(v2);
      });
    }).catch(function (e) { connTag.textContent = '⚠ ' + (e.code || e.message); });
  } else {
    connTag.textContent = '· lokal (kein Raum)';
  }
})();
</script>
</body>
</html>
