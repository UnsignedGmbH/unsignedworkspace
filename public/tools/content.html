<style>
:root {
  --red: #C13030;
  --red-dark: #9A2424;
  --red-dim: rgba(193, 48, 48, 0.08);
  --bg: #f4f3f0;
  --bg2: #fff;
  --bg3: #eee;
  --border: rgba(0, 0, 0, 0.09);
  --border-red: rgba(193, 48, 48, 0.35);
  --text: #111;
  --text-dim: #555;
  --text-dimmer: #aaa;
  --green: #1D9E75;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 120px; }
.header { background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06); }
.header-top { max-width: 980px; margin: 0 auto; padding: 14px 24px 10px; display: flex; align-items: center; gap: 14px; }
.brand-wm { display: flex; align-items: baseline; gap: 6px; flex: 1; }
.brand-wm .bw { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -0.02em; color: var(--text); font-style: italic; line-height: 1; }
.brand-wm .rm { font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px; color: var(--red); transform: translateY(2px); line-height: 1; }
.header-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; line-height: 1; }
.progress-wrap { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.progress-bar-bg { width: 110px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
.progress-count { font-size: 12px; font-weight: 800; color: var(--red); min-width: 42px; text-align: right; }

.tabs { max-width: 980px; margin: 0 auto; padding: 0 24px 10px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--bg2); font-family: inherit; font-size: 11px; font-weight: 700; color: var(--text-dim); cursor: pointer; white-space: nowrap; transition: all 0.15s; -webkit-tap-highlight-color: transparent; position: relative; }
.tab:hover { color: var(--red); border-color: var(--border-red); }
.tab.active { background: var(--red); border-color: var(--red); color: #fff; }
.tab .tab-pct { font-size: 9px; font-weight: 800; opacity: 0.7; background: rgba(0, 0, 0, 0.07); padding: 1px 5px; border-radius: 6px; }
.tab.active .tab-pct { background: rgba(255, 255, 255, 0.18); opacity: 0.9; }
.tab-icon { font-size: 12px; }

.main { max-width: 980px; margin: 0 auto; padding: 22px 24px 0; }

.intro { background: var(--red-dim); border: 1px solid var(--border-red); border-radius: 12px; padding: 14px 18px; margin-bottom: 22px; }
.intro p { font-size: 12px; line-height: 1.55; color: var(--red-dark); font-weight: 600; }
.intro strong { font-weight: 800; }

.section { display: none; }
.section.active { display: block; }

.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.section-head .ic { width: 36px; height: 36px; border-radius: 9px; background: var(--red-dim); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.section-head h1 { font-size: 18px; font-weight: 900; letter-spacing: -0.01em; color: var(--text); }
.section-head .meta { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-top: 2px; }

.block { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
.block-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.block-title::before { content: ""; width: 3px; height: 12px; background: var(--red); border-radius: 2px; }

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field-label { display: block; font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
.field-input, .field-textarea { width: 100%; font-family: inherit; font-size: 13px; font-weight: 500; line-height: 1.5; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 12px; outline: none; transition: border-color 0.15s, background 0.15s; }
.field-input:focus, .field-textarea:focus { border-color: var(--border-red); background: #fff; }
.field-textarea { resize: vertical; min-height: 70px; }
.field-textarea.tall { min-height: 110px; }
.field-hint { font-size: 10px; color: var(--text-dimmer); margin-top: 4px; font-style: italic; line-height: 1.4; }

.field-radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
.field-radio { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg2); cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text-dim); transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.field-radio:hover { border-color: var(--border-red); color: var(--red); }
.field-radio input { display: none; }
.field-radio.is-on { background: var(--red); border-color: var(--red); color: #fff; }

/* Sub-Card-Toolbar (Slot-Listen: Videos + Archiv) */
.slot-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
.slot-count { font-size: 11px; font-weight: 700; color: var(--text-dim); }
.btn-add-slot { background: var(--red); color: #fff; border: 0; border-radius: 9px; padding: 9px 14px; font: 800 12px Montserrat; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s; flex-shrink: 0; margin-left: auto; }
.btn-add-slot:hover { background: var(--red-dark); }

/* Folder-Chips (Strategy-Tabs, ähnlich Design-Moodboard) */
.folder-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.fchip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; background: var(--bg2); border: 1.5px solid var(--border); font: 700 11px Montserrat; color: var(--text-dim); cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; max-width: 220px; }
.fchip:hover { color: var(--red); border-color: var(--border-red); }
.fchip.on { background: var(--red); border-color: var(--red); color: #fff; }
.fchip-name { display: inline-block; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fchip-add { background: transparent; border: 1.5px dashed var(--border); color: var(--text-dim); font-weight: 700; flex-shrink: 0; padding: 8px 14px; font-family: inherit; font-size: 11px; }
.fchip-add:hover { border-color: var(--red); color: var(--red); }

/* Slot-Card (Strategy & Video) */
.slot-card { position: relative; padding-top: 14px; }
.slot-card-head { display: flex; align-items: center; gap: 8px; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
.slot-card-title-input { font-family: inherit; font-size: 13px; font-weight: 800; color: var(--text); flex: 1; min-width: 0; background: transparent; border: 1px solid transparent; border-radius: 6px; padding: 4px 6px; margin: -4px -6px; outline: none; transition: border-color 0.15s, background 0.15s; }
.slot-card-title-input:hover { border-color: var(--border); background: var(--bg); }
.slot-card-title-input:focus { border-color: var(--border-red); background: #fff; }
.slot-card-title-input::placeholder { color: var(--text-dimmer); font-weight: 700; }
.slot-card.is-archived .slot-card-title-input { color: var(--green); }

.slot-typ-pill { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 10px; background: var(--bg3); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
.slot-typ-pill.pb { background: rgba(193,48,48,0.12); color: var(--red); }
.slot-typ-pill.ba { background: rgba(24,95,165,0.12); color: #185fa5; }
.slot-typ-pill.ads { background: rgba(29,158,117,0.12); color: var(--green); }
.slot-typ-pill.cc { background: rgba(120,60,180,0.12); color: #783cb4; }
.slot-typ-pill.multi { background: var(--red-dim); color: var(--red); }

.slot-actions { display: flex; gap: 4px; flex-shrink: 0; }
.slot-action-btn { background: transparent; border: 1px solid var(--border); border-radius: 7px; padding: 5px 8px; font-size: 13px; cursor: pointer; color: var(--text-dim); transition: all 0.15s; -webkit-tap-highlight-color: transparent; line-height: 1; }
.slot-action-btn:hover { color: var(--red); border-color: var(--border-red); }
.slot-action-btn.archive-btn:hover { color: var(--green); border-color: var(--green); }

.slot-card.is-archived { opacity: 0.85; background: rgba(0,0,0,0.02); }
.slot-card-archive-mark { color: var(--green); font-weight: 900; flex-shrink: 0; font-size: 14px; line-height: 1; }

.empty-slots { text-align: center; padding: 40px 20px; color: var(--text-dimmer); font-size: 12px; font-weight: 600; background: var(--bg2); border: 1.5px dashed var(--border); border-radius: 12px; line-height: 1.6; }
.empty-slots strong { color: var(--red); font-weight: 800; }

/* Group: Block-Gruppe innerhalb einer Strategy-Card (kein doppeltes border-radius) */
.slot-group { padding: 14px 0; border-top: 1px solid var(--border); }
.slot-group:first-of-type { padding-top: 0; border-top: 0; }
.slot-group-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.slot-group-title::before { content: ""; width: 3px; height: 12px; background: var(--red); border-radius: 2px; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 640px) {
  .row-2 { grid-template-columns: 1fr; }
  .header-top { padding: 12px 16px 8px; }
  .tabs { padding: 0 16px 10px; }
  .main { padding: 16px 16px 0; }
  .brand-wm .bw, .brand-wm .rm { font-size: 18px; }
  .progress-bar-bg { width: 70px; }
  .slot-toolbar { flex-wrap: wrap; }
}

.foot { max-width: 980px; margin: 24px auto 0; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.foot-status { font-size: 11px; color: var(--text-dimmer); font-weight: 600; }
.foot-status .saved { color: var(--green); opacity: 0; transition: opacity 0.3s; }
.foot-status .saved.show { opacity: 1; }
.foot-rules { font-size: 10px; color: var(--text-dim); font-weight: 600; font-style: italic; }
@media (max-width: 640px) {
  .foot { padding: 0 16px; }
  .foot-rules { display: none; }
}
</style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div>
      <div class="brand-wm">
        <span class="bw">BrandWork</span>
        <span class="rm">Content</span>
      </div>
      <div class="header-eyebrow">Strategie · Videos · Archiv</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div id="progFill" class="progress-bar-fill"></div></div>
      <span id="progCount" class="progress-count">0%</span>
    </div>
  </div>
  <nav id="tabs" class="tabs"></nav>
</header>

<main class="main">
  <div class="intro">
    <p><strong>Strategien</strong> setzen die Grundrichtung — du kannst mehrere parallel pflegen (z.B. Personal Brand vs. Brand Account). <strong>Videos</strong> sind einzelne Ideen, <strong>Archiv</strong> hält fertige.</p>
  </div>

  <div id="sections"></div>
</main>

<div class="foot">
  <span class="foot-status">
    <span id="savedTag" class="saved">✓ Gespeichert</span>
    <span id="connTag"></span>
  </span>
  <span class="foot-rules">Hooks rotieren — eine Idee zweimal posten ist OK, dreimal nicht.</span>
</div>

<script>
(function () {
  // ── SCHEMA ────────────────────────────────────────────────
  // Pro Strategy-Slot werden alle diese Block-Felder gerendert.
  // Account-Typ ist 'checks' = Multi-Select, deselekt-bar.
  var STRATEGY_BLOCKS = [
    {
      title: 'Contentplan',
      fields: [
        { k: 'richtung', label: 'Richtung', type: 'text', ph: 'In welche Richtung soll der Content gehen?' },
        { k: 'nische', label: 'Nische', type: 'text', ph: 'z.B. Streetwear · Y2K · Skate · High-End' },
        { k: 'ueberthemen', label: 'Überthemen', type: 'list', ph: 'Eine Zeile pro Überthema', hint: '3–5 Themen, die immer wiederkehren' },
        { k: 'story', label: 'Story', type: 'textarea', ph: 'Welche Story zieht sich durch den ganzen Content?' },
      ],
    },
    {
      title: 'Account-Typ',
      fields: [
        { k: 'accountTyp', label: 'Wie willst du es machen? (mehrere möglich, Klick toggled)', type: 'checks',
          options: ['Personal Brand', 'Brand Account', 'Ads', 'Content Creator / Influencer'] },
      ],
    },
    {
      title: 'Was wichtig ist',
      fields: [
        { k: 'variation', label: 'Variation', type: 'list', ph: 'Z.B. von dir, vom Produkt, BTS, Kunden-Story…',
          hint: 'Mische Formate — keine Monotonie' },
        { k: 'werblichkeit', label: 'Werblichkeit', type: 'textarea', ph: 'Verhältnis unwerblich vs. werblich. PB eher unwerblich, BA-Werbevideos sind okay.' },
        { k: 'hooks', label: 'Hook-Sammlung', type: 'list', ph: 'Eine Zeile pro Hook',
          hint: 'Sammle alles was hängen bleibt — pro Video pickst du eine raus' },
      ],
    },
    {
      title: 'Creator einbauen',
      fields: [
        { k: 'creator_ugc', label: 'UGC-Creator', type: 'list', ph: '@username · Kontakt · Format' },
        { k: 'creator_mikro', label: 'Mikro-Influencer (Nische muss passen)', type: 'list', ph: '@username · Reichweite · Nische' },
        { k: 'creator_inf', label: 'Influencer (Stats checken!)', type: 'list', ph: '@username · Reichweite · Stats-Link' },
      ],
    },
  ];
  // Flat-list aller Strategy-Felder (für Iteration in Sync/Persistence)
  var STRATEGY_FIELDS = [];
  STRATEGY_BLOCKS.forEach(function (b) { b.fields.forEach(function (f) { STRATEGY_FIELDS.push(f); }); });

  // Felder pro Video-Slot — title wird inline im Card-Header geeditet
  var VIDEO_FIELDS = [
    { k: 'videoTyp', label: 'Video-Typ', type: 'radio', options: ['Personal Brand', 'Brand Account', 'Ads', 'Content Creator / Influencer'] },
    { k: 'hook', label: 'Hook', type: 'text', ph: 'Die Aufmerksamkeits-Zeile in den ersten 2 Sek' },
    { k: 'idee', label: 'Idee / Skript', type: 'textarea', ph: 'Was passiert im Video? Welche Szenen? Wie der Aufbau?' },
    { k: 'link', label: '🔗 Beispielvideo / Inspiration-Link', type: 'text', ph: 'https://… (Instagram, TikTok, YouTube — was dich inspiriert hat)' },
    { k: 'status', label: 'Status', type: 'radio', options: ['Idee', 'In Arbeit', 'Gedreht', 'Live'] },
  ];

  // ── DOM-Helper ────────────────────────────────────────────
  function el(tag, cls, parent) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (parent) parent.appendChild(e);
    return e;
  }
  function clearChildren(node) { while (node && node.firstChild) node.removeChild(node.firstChild); }
  function isFilled(v) { return typeof v === 'string' && v.trim().length > 0; }

  // ── STATE ──────────────────────────────────────────────────
  var STRATEGIES = {};       // id -> { name, _order, ...fields }
  var STRATEGY_REFS = {};    // id -> { fieldKey -> { applyValue, isFocused, input } }
  var VIDEOS = {};           // id -> { title, videoTyp, hook, idee, link, status, _order, archived? }
  var VIDEO_REFS = {};       // id -> { fieldKey -> { applyValue, isFocused, input } }

  var strategyChipsEl, strategyDetailEl;
  var activeStrategyId = null;
  var videosWrapEl, videosCountEl;
  var archiveWrapEl, archiveCountEl;
  var tabBtns = {};

  var tabsEl = document.getElementById('tabs');
  var sectionsEl = document.getElementById('sections');
  var progFill = document.getElementById('progFill');
  var progCount = document.getElementById('progCount');
  var savedTag = document.getElementById('savedTag');
  var connTag = document.getElementById('connTag');

  // ── Render Tabs ────────────────────────────────────────────
  function makeTab(id, icon, label, initialPct, isActive) {
    var btn = el('button', 'tab' + (isActive ? ' active' : ''), tabsEl);
    btn.type = 'button';
    btn.dataset.tab = id;
    var ic = el('span', 'tab-icon', btn); ic.textContent = icon;
    var lbl = el('span', null, btn); lbl.textContent = label;
    var pct = el('span', 'tab-pct', btn); pct.textContent = initialPct;
    btn.addEventListener('click', function () { showTab(id); });
    tabBtns[id] = { btn: btn, pct: pct };
  }
  makeTab('strategy', '🎯', 'Strategie', '0', true);
  makeTab('videos', '🎬', 'Videos', '0', false);
  makeTab('archive', '📦', 'Archiv', '0', false);

  function showTab(id) {
    Object.keys(tabBtns).forEach(function (k) {
      tabBtns[k].btn.classList.toggle('active', k === id);
    });
    sectionsEl.querySelectorAll('.section').forEach(function (s) {
      s.classList.toggle('active', s.dataset.section === id);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Render Sections (3 Tabs) ──────────────────────────────
  // Strategy-Section (Chip-Tabs: eine Strategie aktiv, andere als Chips zum Switchen)
  (function () {
    var sec = el('section', 'section active', sectionsEl);
    sec.dataset.section = 'strategy';

    var head = el('div', 'section-head', sec);
    var ic = el('div', 'ic', head); ic.textContent = '🎯';
    var titleWrap = el('div', null, head);
    var h = el('h1', null, titleWrap); h.textContent = 'Strategie';
    var meta = el('div', 'meta', titleWrap); meta.textContent = 'Mehrere Strategien parallel — switch zwischen ihnen via Chips';

    strategyChipsEl = el('div', 'folder-chips', sec);
    strategyDetailEl = el('div', null, sec);
    strategyDetailEl.id = 'strategy-detail';

    renderStrategyChips();
    renderStrategyDetail();
  })();

  // Videos-Section
  (function () {
    var sec = el('section', 'section', sectionsEl);
    sec.dataset.section = 'videos';

    var head = el('div', 'section-head', sec);
    var ic = el('div', 'ic', head); ic.textContent = '🎬';
    var titleWrap = el('div', null, head);
    var h = el('h1', null, titleWrap); h.textContent = 'Videos';
    var meta = el('div', 'meta', titleWrap); meta.textContent = 'Einzelne Video-Ideen';

    var toolbar = el('div', 'slot-toolbar', sec);
    videosCountEl = el('span', 'slot-count', toolbar);
    videosCountEl.textContent = '0 Videos';
    var addBtn = el('button', 'btn-add-slot', toolbar);
    addBtn.type = 'button';
    addBtn.textContent = '+ Neues Video';
    addBtn.onclick = function () { addVideo(); };

    videosWrapEl = el('div', null, sec);
    videosWrapEl.id = 'videos-wrap';
    renderEmptyVideos();
  })();

  // Archive-Section
  (function () {
    var sec = el('section', 'section', sectionsEl);
    sec.dataset.section = 'archive';

    var head = el('div', 'section-head', sec);
    var ic = el('div', 'ic', head); ic.textContent = '📦';
    var titleWrap = el('div', null, head);
    var h = el('h1', null, titleWrap); h.textContent = 'Archiv';
    var meta = el('div', 'meta', titleWrap); meta.textContent = 'Fertige Videos — kannst du wiederherstellen';

    var toolbar = el('div', 'slot-toolbar', sec);
    archiveCountEl = el('span', 'slot-count', toolbar);
    archiveCountEl.textContent = '0 Archiv';

    archiveWrapEl = el('div', null, sec);
    archiveWrapEl.id = 'archive-wrap';
    renderEmptyArchive();
  })();

  // ── Empty State Strategy (gerendert in detail-area, nicht im chip-bar) ──
  function renderEmptyStrategy() {
    if (!strategyDetailEl) return;
    clearChildren(strategyDetailEl);
    var em = el('div', 'empty-slots', strategyDetailEl);
    em.appendChild(document.createTextNode('Noch keine Strategie.'));
    em.appendChild(document.createElement('br'));
    em.appendChild(document.createTextNode('Klick oben auf '));
    var s = el('strong', null, em); s.textContent = '+ Neu';
    em.appendChild(document.createTextNode(' um deine erste anzulegen.'));
  }
  function renderEmptyVideos() {
    if (!videosWrapEl) return;
    if (countActiveVideos() > 0) return;
    clearChildren(videosWrapEl);
    var em = el('div', 'empty-slots', videosWrapEl);
    em.appendChild(document.createTextNode('Noch keine Videos.'));
    em.appendChild(document.createElement('br'));
    em.appendChild(document.createTextNode('Klick oben auf '));
    var s = el('strong', null, em); s.textContent = '+ Neues Video';
    em.appendChild(document.createTextNode(' um die erste Idee zu sammeln.'));
  }
  function renderEmptyArchive() {
    if (!archiveWrapEl) return;
    if (countArchivedVideos() > 0) return;
    clearChildren(archiveWrapEl);
    var em = el('div', 'empty-slots', archiveWrapEl);
    em.appendChild(document.createTextNode('Noch nichts archiviert.'));
    em.appendChild(document.createElement('br'));
    em.appendChild(document.createTextNode('Wenn ein Video fertig ist, klick auf '));
    var s = el('strong', null, em); s.textContent = '📦';

  // ── Field-Rendering (gemeinsam für Strategy + Video) ──────
  // Multi-Value-Helper für 'checks'-Type
  function multiArr(v) { return (v || '').split('|').filter(function (x) { return x; }); }
  function multiJoin(arr) { return arr.join('|'); }

  // dataObj: STRATEGIES[id] oder VIDEOS[id]; refsBag: STRATEGY_REFS[id] oder VIDEO_REFS[id]
  function renderField(it, parent, dataObj, refsBag, onPersist, onChange) {
    var f = el('div', 'field', parent);
    var lab = el('label', 'field-label', f); lab.textContent = it.label;
    var inputEl;

    if (it.type === 'text') {
      inputEl = el('input', 'field-input', f);
      inputEl.type = 'text';
      inputEl.placeholder = it.ph || '';
    } else if (it.type === 'list' || it.type === 'textarea') {
      inputEl = el('textarea', 'field-textarea' + (it.type === 'list' ? ' tall' : ''), f);
      inputEl.placeholder = it.ph || '';
    } else if (it.type === 'radio') {
      var grp = el('div', 'field-radio-group', f);
      it.options.forEach(function (opt) {
        var lbl2 = el('label', 'field-radio', grp);
        var inp = el('input', null, lbl2);
        inp.type = 'radio'; inp.name = it.k + '_' + Math.random().toString(36).slice(2, 7); inp.value = opt;
        var sp = el('span', null, lbl2); sp.textContent = opt;
        lbl2.addEventListener('click', function (e) {
          if (e.target !== inp) e.preventDefault();
          // Toggle radio: zweimal klicken deselektiert
          if (dataObj[it.k] === opt) {
            dataObj[it.k] = '';
          } else {
            dataObj[it.k] = opt;
          }
          grp.querySelectorAll('.field-radio').forEach(function (l) {
            l.classList.toggle('is-on', l.querySelector('input').value === dataObj[it.k]);
          });
          onPersist(it.k);
          if (onChange) onChange();
          updateProgress();
        });
      });
      refsBag[it.k] = {
        applyValue: function (v) {
          dataObj[it.k] = v || '';
          grp.querySelectorAll('.field-radio').forEach(function (l) {
            l.classList.toggle('is-on', l.querySelector('input').value === v);
          });
        },
        isFocused: function () { return false; },
      };
      if (it.hint) {
        var hint = el('div', 'field-hint', f); hint.textContent = it.hint;
      }
      return;
    } else if (it.type === 'checks') {
      var grp2 = el('div', 'field-radio-group', f);
      it.options.forEach(function (opt) {
        var lbl3 = el('label', 'field-radio', grp2);
        var inp2 = el('input', null, lbl3);
        inp2.type = 'checkbox'; inp2.value = opt;
        var sp2 = el('span', null, lbl3); sp2.textContent = opt;
        lbl3.addEventListener('click', function (e) {
          if (e.target !== inp2) e.preventDefault();
          var arr = multiArr(dataObj[it.k]);
          var idx = arr.indexOf(opt);
          if (idx >= 0) arr.splice(idx, 1); else arr.push(opt);
          dataObj[it.k] = multiJoin(arr);
          grp2.querySelectorAll('.field-radio').forEach(function (l) {
            l.classList.toggle('is-on', arr.indexOf(l.querySelector('input').value) >= 0);
          });
          onPersist(it.k);
          if (onChange) onChange();
          updateProgress();
        });
      });
      refsBag[it.k] = {
        applyValue: function (v) {
          dataObj[it.k] = v || '';
          var arr = multiArr(v);
          grp2.querySelectorAll('.field-radio').forEach(function (l) {
            l.classList.toggle('is-on', arr.indexOf(l.querySelector('input').value) >= 0);
          });
        },
        isFocused: function () { return false; },
      };
      if (it.hint) {
        var hint2 = el('div', 'field-hint', f); hint2.textContent = it.hint;
      }
      return;
    }
    if (inputEl) {
      if (dataObj[it.k]) inputEl.value = dataObj[it.k];
      var deb;
      inputEl.addEventListener('input', function () {
        dataObj[it.k] = inputEl.value;
        if (onChange) onChange();
        clearTimeout(deb);
        deb = setTimeout(function () {
          onPersist(it.k);
          updateProgress();
        }, 350);
      });
      refsBag[it.k] = {
        input: inputEl,
        applyValue: function (v) {
          dataObj[it.k] = v || '';
          inputEl.value = v || '';
        },
        isFocused: function () { return document.activeElement === inputEl; },
      };
    }
    if (it.hint) {
      var hint3 = el('div', 'field-hint', f); hint3.textContent = it.hint;
    }
  }

  // ── Apply remote state ────────────────────────────────────
  function applyRemoteStrategies(data) {
    var newIds = data ? Object.keys(data) : [];
    var oldIds = Object.keys(STRATEGIES);
    var detailNeedsRerender = false;
    // Removed
    oldIds.forEach(function (id) {
      if (newIds.indexOf(id) < 0) {
        delete STRATEGIES[id];
        delete STRATEGY_REFS[id];
        if (id === activeStrategyId) {
          activeStrategyId = null;
          detailNeedsRerender = true;
        }
      }
    });
    // Added or updated
    newIds.forEach(function (id) {
      var v = data[id] || {};
      if (!STRATEGIES[id]) {
        // Neu: nur Daten setzen, Chip kommt beim Re-Render der Chips. Detail
        // nur falls noch keine aktive Strategie da ist.
        STRATEGIES[id] = v;
        if (!activeStrategyId) {
          activeStrategyId = id;
          detailNeedsRerender = true;
        }
      } else if (id === activeStrategyId) {
        // Aktiv: Felder via REFs syncen (preserves focus)
        STRATEGIES[id] = STRATEGIES[id] || {};
        Object.keys(STRATEGY_REFS[id] || {}).forEach(function (k) {
          var ref = STRATEGY_REFS[id][k];
          if (!ref) return;
          if (ref.isFocused && ref.isFocused()) {
            STRATEGIES[id][k] = ref.input ? ref.input.value : STRATEGIES[id][k];
            return;
          }
          ref.applyValue(v[k] || '');
        });
        // Auch andere Felder die nicht in REFs sind (z.B. _order)
        Object.keys(v).forEach(function (k) {
          if (!STRATEGY_REFS[id] || !STRATEGY_REFS[id][k]) {
            STRATEGIES[id][k] = v[k];
          }
        });
        // Pill update
        if (strategyDetailEl) {
          var card = strategyDetailEl.querySelector('[data-id="' + id + '"]');
          if (card) {
            var pillEl = card.querySelector('.slot-typ-pill');
            if (pillEl) updateStrategyPill(pillEl, v.accountTyp);
          }
        }
      } else {
        // Inaktiv: Daten einfach übernehmen, Chip-Text wird beim Re-Render aktualisiert
        STRATEGIES[id] = v;
      }
    });
    // Wenn aktive verschwunden ist und keine andere gewählt, erste wählen
    if (!activeStrategyId && Object.keys(STRATEGIES).length > 0) {
      activeStrategyId = sortedStrategyIds()[0];
      detailNeedsRerender = true;
    }
    renderStrategyChips();
    if (detailNeedsRerender) renderStrategyDetail();
    updateStrategyCount();
    updateProgress();
  }

  function applyRemoteVideos(data) {
    var newIds = data ? Object.keys(data) : [];
    var oldIds = Object.keys(VIDEOS);
    oldIds.forEach(function (id) {
      if (newIds.indexOf(id) < 0) {
        delete VIDEOS[id];
        removeVideoCardFromDOM(id);
      }
    });
    newIds.forEach(function (id) {
      var v = data[id] || {};
      var nowArchived = !!v.archived;
      if (!VIDEOS[id]) {
        VIDEOS[id] = v;
        var targetWrap = nowArchived ? archiveWrapEl : videosWrapEl;
        var emptyEl = targetWrap.querySelector('.empty-slots');
        if (emptyEl) clearChildren(targetWrap);
        renderVideoCard(id, nowArchived);
      } else {
        var wasArchived = !!VIDEOS[id].archived;
        VIDEOS[id] = VIDEOS[id] || {};
        Object.keys(VIDEO_REFS[id] || {}).forEach(function (k) {
          var ref = VIDEO_REFS[id][k];
          if (!ref) return;
          if (ref.isFocused && ref.isFocused()) {
            VIDEOS[id][k] = ref.input ? ref.input.value : VIDEOS[id][k];
            return;
          }
          ref.applyValue(v[k] || '');
        });
        VIDEOS[id].archived = v.archived;
        if (wasArchived !== nowArchived) {
          removeVideoCardFromDOM(id);
          var targetWrap2 = nowArchived ? archiveWrapEl : videosWrapEl;
          var emptyEl2 = targetWrap2.querySelector('.empty-slots');
          if (emptyEl2) clearChildren(targetWrap2);
          renderVideoCard(id, nowArchived);
        } else {
          var card = (wasArchived ? archiveWrapEl : videosWrapEl).querySelector('[data-id="' + id + '"]');
          if (card) {
            var pillEl = card.querySelector('.slot-typ-pill');
            if (pillEl) updateVideoPill(pillEl, v.videoTyp);
          }
        }
      }
    });
    if (countActiveVideos() === 0) renderEmptyVideos();
    if (countArchivedVideos() === 0) renderEmptyArchive();
    updateVideoCount();
    updateArchiveCount();
    updateProgress();
  }

  // ── Migration: alte Daten holen ───────────────────────────
  // 1. Wenn content/strategies leer aber content/strategy hat Daten →
  //    altes Single-Strategy als ersten Slot mit Name 'Hauptstrategie'.
  // 2. Wenn content/strategy leer aber social/content hat Daten →
  //    alte social-Daten zuerst nach content/strategy, dann nach Slot.
  function migrate() {
    if (!_R || !_D) return Promise.resolve();
    var base = _D.ref('rooms/' + _R);
    return base.child('content/strategies').once('value').then(function (snap) {
      if (snap.exists() && snap.val()) return; // schon da
      // Versuche aus content/strategy zu lesen
      return base.child('content/strategy').once('value').then(function (s2) {
        var legacy = s2.val();
        var lift = function (legacyData) {
          if (!legacyData || typeof legacyData !== 'object') return Promise.resolve();
          var id = genId('s');
          var slot = makeEmptyStrategy('Hauptstrategie');
          STRATEGY_FIELDS.forEach(function (f) {
            if (legacyData[f.k] != null) slot[f.k] = legacyData[f.k];
          });
          return base.child('content/strategies/' + id).set(slot);
        };
        if (legacy) return lift(legacy);
        // Sonst: alte social/content
        return base.child('social/content').once('value').then(function (s3) {
          var oldSoc = s3.val();
          if (oldSoc) return lift(oldSoc);
        });
      });
    }).catch(function () {});
  }

  // ── Init ───────────────────────────────────────────────────
  updateStrategyCount();
  updateVideoCount();
  updateArchiveCount();
  updateProgress();

  if (_R && _D) {
    connTag.textContent = '· verbunden';
    migrate().then(function () {
      _D.ref('rooms/' + _R + '/content').once('value').then(function (snap) {
        var v = snap.val() || {};
        applyRemoteStrategies(v.strategies || null);
        applyRemoteVideos(v.videos || null);
        _D.ref('rooms/' + _R + '/content').on('value', function (s) {
          var v2 = s.val() || {};
          applyRemoteStrategies(v2.strategies || null);
          applyRemoteVideos(v2.videos || null);
        });
      }).catch(function (e) { connTag.textContent = '⚠ ' + (e.code || e.message); });
    });
  } else {
    connTag.textContent = '· lokal (kein Raum)';
  }
})();
</script>
</body>
